function setSrv(id,pid,n){srv[id]=n;persist();renderDetail(pid);}
function startT(id,dur,pid){
  const tm=timers[id];if(tm&&tm.run)return;
  timers[id]={left:dur,run:true,done:false,int:null};
  timers[id].int=setInterval(()=>{
    timers[id].left--;
    if(timers[id].left<=0){clearInterval(timers[id].int);timers[id].run=false;timers[id].done=true;}
    updT(id,dur);
  },1000);updT(id,dur);
}
function updT(id,dur){
  const tm=timers[id];if(!tm)return;
  const r=R.find(x=>x.id===id),c=r?clr(r):'#c9a96e';
  const circ=2*Math.PI*25,pct=tm.done?1:tm.run?(dur-tm.left)/dur:0;
  const arc=document.getElementById('arc'+id),num=document.getElementById('tnum'+id),lbl=document.getElementById('tlbl'+id);
  if(arc)arc.style.strokeDashoffset=circ*(1-pct);
  if(num){num.textContent=tm.done?"✓":tm.run?tm.left:"Go";num.style.color=tm.done?c:'var(--text)';num.style.fontSize=tm.run||tm.done?'18px':'13px';}
  if(lbl)lbl.textContent=tm.done?"Ready":tm.run?"Shaking":"Tap";
}

function toggleSave(id){
  const idx=saved.findIndex(x=>x.id===id);
  if(idx>=0)saved.splice(idx,1);
  else{const r=R.find(x=>x.id===id);if(r)saved.push({id:r.id,name:r.name,cat:r.cat,base:r.base});}
  persist();renderDetail(curPage);if(curPage==='saved')renderSaved();
}
function saveLog(id,pid){
  const note=document.getElementById('logTA')?.value?.trim();if(!note)return;
  if(!logs[id])logs[id]=[];
  logs[id].unshift({date:new Date().toLocaleDateString(),rating:logRat,note});
  logs[id]=logs[id].slice(0,5);persist();showLog=false;renderDetail(pid);
}

// ── MY BAR ───────────────────────────────────────────────────
function addCustomIng(){
  const nameEl=document.getElementById('newIngName');
  const typeEl=document.getElementById('newIngType');
  if(!nameEl)return;
  const name=(nameEl?.value||'').trim();
  if(!name)return;
  // Don't add exact duplicates
  const allNames=[...ALLS,...customIngs.map(c=>c.n)];
  const isDupe=allNames.some(n=>n.toLowerCase()===name.toLowerCase());
  if(isDupe){
    nameEl.style.borderColor='#ef4444';
    nameEl.placeholder='Already in list — try a different name';
    setTimeout(()=>{nameEl.style.borderColor='';nameEl.placeholder='Add custom ingredient...';},2000);
    return;
  }
  const t=typeEl?.value||'other';
  customIngs.push({n:name,t});
  ITM[name]=t;
  // Auto-add to bar
  if(!myBar.includes(name))myBar.push(name);
  persist();
  nameEl.value='';
  renderBar();
}

function removeCustomIng(name){
  customIngs=customIngs.filter(c=>c.n!==name);
  myBar=myBar.filter(b=>b!==name);
  delete ITM[name];
  persist();
  renderBar();
}

function renderBar(){
  const mk=R.filter(r=>r.i.every(g=>myBar.includes(g.n)));
  document.getElementById('barCount').textContent=myBar.length+' items';
  document.getElementById('mkCount').textContent=mk.length+' recipes';
  document.getElementById('barGrid').innerHTML=(()=>{
    const bq=(document.getElementById('barSearch')?.value||'').toLowerCase().trim();
    return [...ALLS,...customIngs.map(c=>c.n)].sort((a,b)=>a.localeCompare(b)).filter(n=>!bq||n.toLowerCase().includes(bq)).map(n=>{
    const h=myBar.includes(n),tc=TC[ITM[n]||'other']||'#888';
    const isCustom=customIngs.some(c=>c.n===n);
    return`<button class="bar-item" style="${h?`background:${tc}18;border-color:${tc}50`:''}" onclick="togBar('${n.replace(/'/g,"\'")}')">
      <div style="display:flex;align-items:center;gap:7px;flex:1;min-width:0">
        <div style="width:6px;height:6px;border-radius:50%;background:${h?tc:'#374151'};flex-shrink:0"></div>
        <span style="font-size:13px">${n}</span>
        ${isCustom?`<span style="font-size:7px;letter-spacing:1px;color:var(--accent);border:1px solid rgba(196,122,42,0.35);border-radius:3px;padding:1px 4px;flex-shrink:0">custom</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="badge" style="background:${tc}20;color:${tc}">${TL[ITM[n]||'other']||'Other'}</span>
        ${h?'<span style="color:#10b981;font-size:13px">✓</span>':''}
        ${isCustom?`<span onclick="event.stopPropagation();removeCustomIng('${n.replace(/'/g,"\'")}');" style="color:#ef4444;font-size:16px;line-height:1;padding:0 2px;cursor:pointer">×</span>`:''}
      </div>
    </button>`;
    }).join('');})();
  document.getElementById('mkGrid').innerHTML=mk.length===0?
    `<div class="empty" style="grid-column:1/-1">Check off your bar above to discover what you can make tonight</div>`:
    mk.map(r=>{const c=clr(r);return`<button class="mkcard" style="background:${c}15;border-color:${c}45" onclick="goTo(${r.id})">
      <div style="width:5px;height:5px;border-radius:50%;background:${c};margin-bottom:5px"></div>
      <div style="font-family:'Playfair Display',serif;font-size:15px;margin-bottom:2px">${r.name}</div>
      <div style="font-size:10px;color:var(--muted);font-style:italic;margin-bottom:5px">${r.base} · ${r.cat}</div>
      <div style="font-size:10px;color:${c};letter-spacing:1px">→ View</div>
    </button>`;}).join('');

  // Wire addIngTap every time bar renders — iOS-safe touchend + click
  var tap=document.getElementById('addIngTap');
  if(tap&&tap.cloneNode){
    var newTap=tap.cloneNode(true);
    if(tap.parentNode){tap.parentNode.replaceChild(newTap,tap);}
    newTap.addEventListener('touchend',function(e){e.preventDefault();addCustomIng();},{passive:false});
    newTap.addEventListener('click',function(e){e.preventDefault();addCustomIng();});
  }
  var ni=document.getElementById('newIngName');
  if(ni&&ni.cloneNode){
    var newNi=ni.cloneNode(true);
    if(ni.parentNode){ni.parentNode.replaceChild(newNi,ni);}
    newNi.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addCustomIng();}});
  }
}
function togBar(n){const i=myBar.indexOf(n);if(i>=0)myBar.splice(i,1);else myBar.push(n);persist();renderBar();}
function goTo(id){
  const r=R.find(x=>x.id===id);if(!r)return;
  const pid=SPAGES[r.base.toLowerCase()]?r.base.toLowerCase():'discover';
  selId[pid]=id;srv[id]=1;showShop=false;showLog=false;
  showPage(pid);
  document.querySelectorAll('.bnav-btn').forEach((b,i)=>b.classList.toggle('on',[['discover','spirits','bar','generator','saved']][i]===pid));
  setTimeout(()=>document.getElementById(pid+'Detail')?.scrollIntoView({behavior:'smooth'}),100);
}

function getCOTD(){
  const today=new Date();
  const seed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
  const idx=seed % R.length;
  return R[idx]||R[0];
}

          <div style="width:21px;height:21px;border-radius:50%;background:${c};color:#000;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px">${i+1}</div>
          <div style="font-size:13px;line-height:1.65;color:#c8b89a;padding-top:2px">${s}</div>
        </div>`).join('')}
        <div style="margin-top:10px;padding:10px 12px;background:rgba(196,122,42,0.08);border:1px solid rgba(196,122,42,0.2);border-radius:4px">
          <div style="font-size:8px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:4px;font-weight:500">Garnish</div>
          <div style="font-size:12px;color:#c8b89a">${gr.garnish}</div>
        </div>
        ${gr.tip?`<div style="margin-top:8px;padding:10px 12px;background:rgba(18,12,4,0.6);border-left:2px solid ${c};border-radius:0 4px 4px 0">
          <div style="font-size:12px;color:var(--muted);font-style:italic;line-height:1.6">${gr.tip}</div>
        </div>`:''}
      </div>
      <div style="padding:4px 15px 14px;border-top:1px solid rgba(255,255,255,0.05)">
        <button id="regenBtn" style="background:transparent;border:1px solid rgba(196,122,42,0.3);border-radius:4px;color:var(--accent-light);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;cursor:pointer;width:100%">↻ Generate Another</button>
      </div>
    </div>`;
  }

  el.innerHTML=html;

  // Wire up buttons
  const gb=document.getElementById('genBtn');
  if(gb)gb.addEventListener('click',function(e){e.preventDefault();if(!genLoading)generateRecipe();});
  const rb=document.getElementById('regenBtn');
  if(rb)rb.addEventListener('click',function(e){e.preventDefault();generateRecipe();});
}

function generateRecipe(){
  if(genLoading)return;
  const allOwned=[...myBar,...customIngs.map(c=>c.n)];
  if(!allOwned.length)return;

  genLoading=true;genResult=null;renderGenerator();

  const prompt=`You are a world-class bartender. Create an original cocktail recipe using ONLY ingredients from this list: ${allOwned.join(', ')}.

You may assume the person always has: ice, water, simple syrup, sugar, salt.

Respond with ONLY valid JSON, no markdown, no explanation:
{
  "name": "Creative cocktail name",
  "desc": "One sentence evocative description",
  "cat": "Category (Sour/Stirred/Highball/Tiki/Classic/Creamy/Espresso Martini)",
  "style": "Shaken or Stirred or Built",
  "ingredients": [{"name": "ingredient name", "amount": "measurement like 2 oz or 3/4 oz"}],
  "steps": ["Step 1", "Step 2", "Step 3"],
  "garnish": "Garnish description",
  "tip": "One professional bartender tip"
}`;

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:prompt}]
    })
  })
  .then(r=>r.json())
  .then(data=>{
    const text=data.content?.[0]?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const recipe=JSON.parse(clean);
    genResult=recipe;
    genLoading=false;
    renderGenerator();
  })
  .catch(err=>{
    console.error('AI gen error:',err);
    // Fallback to local generator
    genResult=buildRecipeFromBar(allOwned);
    genLoading=false;
    renderGenerator();
  });
}

function buildRecipeFromBar(owned){
  if(!window._genHistory)window._genHistory=[];
  // Categorize what we have
  const spirits=owned.filter(n=>(ITM[n]||'other')==='spirit');
  const liqueurs=owned.filter(n=>(ITM[n]||'other')==='liqueur');
  const syrups=owned.filter(n=>(ITM[n]||'other')==='syrup');
  const juices=owned.filter(n=>(ITM[n]||'other')==='juice');
  const mixers=owned.filter(n=>(ITM[n]||'other')==='mixer');
  const bitters=owned.filter(n=>(ITM[n]||'other')==='bitters');
  const vermouths=owned.filter(n=>(ITM[n]||'other')==='vermouth');
  const creams=owned.filter(n=>(ITM[n]||'other')==='cream');

  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  const has=n=>owned.some(x=>x.toLowerCase().includes(n.toLowerCase()));
  const rand=()=>Math.random();

  // Build ingredient list and derive recipe style
  let ings=[], style='Shaken', cat='Classic', name='', desc='', garnish='', tip='';

  // ── DECIDE RECIPE STYLE based on inventory ─────────────────
  const hasSpirit=spirits.length>0;
  const hasLiqueur=liqueurs.length>0;
  const hasCitrus=juices.some(j=>j.toLowerCase().includes('lime')||j.toLowerCase().includes('lemon')||j.toLowerCase().includes('grapefruit'));
  const hasSoda=mixers.some(m=>m.toLowerCase().includes('soda')||m.toLowerCase().includes('water')||m.toLowerCase().includes('tonic')||m.toLowerCase().includes('ginger'));
  const hasVermouth=vermouths.length>0;
  const hasCream=creams.length>0;
  const hasEspresso=owned.some(n=>n.toLowerCase().includes('espresso')||n.toLowerCase().includes('coffee')||n.toLowerCase().includes('cold brew'));
  const hasCoffeeLiqueur=liqueurs.some(n=>n.toLowerCase().includes('kahlúa')||n.toLowerCase().includes('tia maria')||n.toLowerCase().includes('mr. black'));
  const hasWhiskey=spirits.some(n=>n.toLowerCase().includes('bourbon')||n.toLowerCase().includes('rye')||n.toLowerCase().includes('whiskey')||n.toLowerCase().includes('scotch'));
  const hasVodka=spirits.some(n=>n.toLowerCase().includes('vodka'));
  const hasGin=spirits.some(n=>n.toLowerCase().includes('gin'));
  const hasTequila=spirits.some(n=>n.toLowerCase().includes('tequila')||n.toLowerCase().includes('mezcal'));
  const hasRum=spirits.some(n=>n.toLowerCase().includes('rum'));
  const hasCognac=spirits.some(n=>n.toLowerCase().includes('cognac')||n.toLowerCase().includes('brandy')||n.toLowerCase().includes('pisco')||n.toLowerCase().includes('calvados'));

  // ── ROUTE TO BEST RECIPE TEMPLATE ──────────────────────────
  // Build list of viable routes then shuffle to pick randomly
  const viableRoutes=[];
  if(hasEspresso&&(hasVodka||hasCoffeeLiqueur)) viableRoutes.push('espresso');
  if(hasCitrus&&hasSpirit) viableRoutes.push('sour');
  if(hasSoda&&hasSpirit) viableRoutes.push('highball');
  if(hasVermouth&&hasSpirit) viableRoutes.push('stirred');
  if(hasCream&&(hasLiqueur||hasSpirit)) viableRoutes.push('creamy','creamy'); // weighted
  if(hasSpirit&&hasLiqueur) viableRoutes.push('spirit_liq','spirit_liq','spirit_liq'); // weighted
  if(hasSpirit) viableRoutes.push('fallback');
  // Shuffle and pick — avoid last used route
  const lastRoute=window._lastRoute||'';
  const shuffled=viableRoutes.filter(r=>r!==lastRoute||viableRoutes.length===1).sort(()=>Math.random()-0.5);
  const chosenRoute=shuffled[0]||'fallback';
  window._lastRoute=chosenRoute;

  if(chosenRoute==='espresso'){
    // Espresso martini variation
    const baseSpirit=spirits.find(n=>n.toLowerCase().includes('vodka'))||spirits[0];
    const coffeeLiq=liqueurs.find(n=>n.toLowerCase().includes('kahlúa')||n.toLowerCase().includes('tia maria')||n.toLowerCase().includes('mr. black'));
    const espresso=owned.find(n=>n.toLowerCase().includes('espresso')||n.toLowerCase().includes('coffee')||n.toLowerCase().includes('cold brew'));
    ings=[{name:baseSpirit,amount:'2 oz'}];
    if(coffeeLiq)ings.push({name:coffeeLiq,amount:'1 oz'});
    if(espresso)ings.push({name:espresso,amount:'1 oz'});
    const extraLiq=liqueurs.filter(n=>n!==coffeeLiq&&!n.toLowerCase().includes('kahlúa'));
    if(extraLiq.length&&rand()>0.4)ings.push({name:pick(extraLiq),amount:'½ oz'});
    if(syrups.length&&rand()>0.5)ings.push({name:pick(syrups),amount:'¼ oz'});
    if(creams.length&&rand()>0.6)ings.push({name:pick(creams),amount:'½ oz'});
    style='Shaken';cat='Espresso Martini';
    const adj=pick(['Midnight','Velvet','After Dark','Noir','Twilight','Obsidian','Ghost','Phantom','Dark Matter','Shadow','Eclipse','Smoke']);
    const sfx=pick(['Espresso','Martini','Shot','Ritual','Elixir','Blend']);
    name=adj+' '+sfx;
    desc='A complex, aromatic take on the espresso martini built from your bar.';
    garnish='3 espresso beans';
    tip='Shake very hard for 20–25 seconds. Cool espresso is essential — warm espresso kills the foam.';

  } else if(chosenRoute==='sour'){
    // Sour or citrus build
    const baseSpirit=pick(spirits);
    ings=[{name:baseSpirit,amount:'2 oz'}];
    const citrus=juices.find(j=>j.toLowerCase().includes('lime')||j.toLowerCase().includes('lemon'))||juices[0];
    ings.push({name:citrus,amount:'¾ oz'});
    if(syrups.length)ings.push({name:pick(syrups),amount:'½ oz'});
    else ings.push({name:'Simple Syrup',amount:'½ oz'});
    if(liqueurs.length&&rand()>0.5)ings.push({name:pick(liqueurs),amount:'½ oz'});
    if(bitters.length&&rand()>0.6)ings.push({name:pick(bitters),amount:'2 dashes',unit:'dashes'});
    style='Shaken';cat='Sour';
    const adj=pick(['Golden','Bright','Gilded','Amber','Burnished','Copper','Citrus','Sharp','Clean','Sunlit','Fresh','Electric']);
    const noun=pick(['Dusk','Hour','Light','Side','Fix','Twist','Sour','Flash','Fade','Spark','Bite','Drop']);
    name=adj+' '+noun;
    desc='A bright, citrus-forward drink with depth from your bar.';
    garnish=citrus.toLowerCase().includes('lime')?'Lime wheel':'Lemon wheel';
    tip='Double strain for a clean, professional finish. Taste before serving — balance the sweet and sour to your preference.';

  } else if(chosenRoute==='highball'){
    // Highball
    const baseSpirit=pick(spirits);
    const mixer=pick(mixers.filter(m=>m.toLowerCase().includes('soda')||m.toLowerCase().includes('water')||m.toLowerCase().includes('tonic')||m.toLowerCase().includes('ginger')))||pick(mixers);
    ings=[{name:baseSpirit,amount:'2 oz'}];
    if(juices.length)ings.push({name:pick(juices),amount:'½ oz'});
    if(syrups.length&&rand()>0.5)ings.push({name:pick(syrups),amount:'¼ oz'});
    if(bitters.length&&rand()>0.6)ings.push({name:pick(bitters),amount:'2 dashes',unit:'dashes'});
    ings.push({name:mixer,amount:'3–4 oz'});
    style='Built';cat='Highball';
    const adj=pick(['Easy','Long','Still','Sunday','Slow','Quiet','Cool','Open','Breezy','Smooth','Lazy','Low']);
    const noun=pick(['Pour','Evening','Session','Drift','Fade','Hour','Stretch','Side','Float','Run','Day','Current']);
    name=adj+' '+noun;
    desc='A long, easy-drinking highball built to your bar.';
    garnish='Citrus wheel or wedge';
    tip='Keep the ice as large as possible and pour the mixer very slowly to preserve carbonation.';

  } else if(chosenRoute==='stirred'){
    // Stirred / spirit-forward
    const baseSpirit=pick(spirits);
    ings=[{name:baseSpirit,amount:'2 oz'}];
    ings.push({name:pick(vermouths),amount:'1 oz'});
    if(liqueurs.length&&rand()>0.5)ings.push({name:pick(liqueurs),amount:'½ oz'});
    if(bitters.length)ings.push({name:pick(bitters),amount:'2 dashes',unit:'dashes'});
    style='Stirred';cat='Stirred';
    const adj=pick(['The Late','The Still','The Quiet','The Dark','The Last','The Long','The Deep','The Slow','The Cold','The Low','The Far','The Old']);
    const noun=pick(['Shift','Call','Round','Watch','Hand','Measure','Glass','Hour','Night','Move','Turn','Draw']);
    name=adj+' '+noun;
    desc='A spirit-forward, stirred drink with complexity and depth.';
    garnish='Expressed citrus peel';
    tip='Stir for 30 full seconds over large ice. Taste for dilution — it should feel silky, not watery.';

  } else if(chosenRoute==='creamy'){
    // Creamy / dessert
    const baseSpirit=hasSpirit?pick(spirits):null;
    const liq=pick(liqueurs);
    if(baseSpirit)ings.push({name:baseSpirit,amount:'1½ oz'});
    ings.push({name:liq,amount:'1 oz'});
    ings.push({name:pick(creams),amount:'1 oz'});
    if(syrups.length&&rand()>0.5)ings.push({name:pick(syrups),amount:'¼ oz'});
    style='Shaken';cat='Classic';
    const adj=pick(['Silk','Velvet','Cloud','Dusk','Ivory','Cream','White','Soft','Pale','Sweet','Rich','Satin']);
    const noun=pick(['Dream','Hour','Curtain','Veil','Fade','Smoke','Night','Spell','Touch','Drift','Rest','Gloss']);
    name=adj+' '+noun;
    desc=pick(['A rich, indulgent after-dinner cocktail from your bar.','Dessert you can sip. No fork required.','A nightcap with serious intentions.','Silky, complex, and deeply satisfying.','The drink the evening has been building toward.']);
    garnish='Fresh grated nutmeg or cocoa powder';
    tip='Shake extra hard to fully incorporate the cream. Serve immediately while cold.';

  } else if(chosenRoute==='spirit_liq'){
    // Spirit + liqueur build
    const baseSpirit=pick(spirits);
    const liq=pick(liqueurs);
    ings=[{name:baseSpirit,amount:'1½ oz'},{name:liq,amount:'¾ oz'}];
    if(juices.length)ings.push({name:pick(juices),amount:'½ oz'});
    if(syrups.length&&rand()>0.5)ings.push({name:pick(syrups),amount:'¼ oz'});
    if(bitters.length&&rand()>0.6)ings.push({name:pick(bitters),amount:'2 dashes',unit:'dashes'});
    style=rand()>0.5?'Shaken':'Stirred';cat='Classic';
    const adj=pick(['The','A','One','Last','First','Pure','Another','Each','Every','Any','No','This']);
    const noun=pick(['Night','Call','Pour','Measure','Round','Glass','Reason','Way','Rule','Choice','Move','Thought']);
    name=adj+' '+noun;
    desc=pick(['A balanced two-spirit build that makes the most of your bar.','An elegant pairing that lets both spirits speak.','Bold character, carefully balanced.','A house cocktail worth repeating.','Two bottles, one idea, perfectly executed.']);
    garnish='Citrus peel or cocktail cherry';
    tip='Taste as you build — the ratio between spirit and liqueur is everything. Adjust to your palate.';

  } else {
    // Fallback
    const baseSpirit=hasSpirit?pick(spirits):pick(owned);
    ings=[{name:baseSpirit,amount:'2 oz'}];
    if(owned.length>1){
      const second=owned.find(n=>n!==baseSpirit);
      if(second)ings.push({name:second,amount:'1 oz'});
    }
    style='Stirred';cat='Classic';
    name='The Honest Pour';
    desc='Sometimes simplicity is the whole point.';
    garnish='Expressed citrus peel';
    tip='When in doubt, let the spirit speak for itself. Great ice and a cold glass make all the difference.';
  }

  // Steps based on style
  const steps=style==='Shaken'
    ?['Add all ingredients to a cocktail shaker.','Fill with ice and shake hard for 15 seconds.','Double strain into a chilled glass.']
    :style==='Stirred'
    ?['Combine all ingredients in a mixing glass.','Add ice and stir for 30 seconds until cold and diluted.','Strain into a chilled glass over a large ice cube.']
    :['Fill your glass with ice.','Add ingredients in order listed.','Stir gently and garnish.'];

  // Avoid repeating recent names — regenerate name if it was recent
  let attempts=0;
  while(window._genHistory.includes(name)&&attempts<8){
    // Re-roll the name using the same pools
    const a2=['Midnight','Golden','Easy','Silk','Late','Pure','Dark','Bright','Long','Velvet','Quiet','Amber'];
    const n2=['Pour','Dusk','Round','Dream','Night','Glass','Shift','Hour','Session','Fade','Call','Veil'];
    name=pick(a2)+' '+pick(n2);
    attempts++;
  }
  window._genHistory.push(name);
  if(window._genHistory.length>6)window._genHistory.shift();

  return {name,desc,cat,style,ingredients:ings,steps,garnish,tip};
}

  setTimeout(()=>{ta.style.borderColor='rgba(196,122,42,0.2)';},1000);
}

function deleteNote(id,pid){
  delete notes[id];
  persist();
  renderDetail(pid);
}

// ── SHARE RECIPE ─────────────────────────────────────────────
function shareRecipe(id){
  const r=R.find(x=>x.id===id);if(!r)return;
  const s=srv[id]||1;
  const lines=[
    '🍸 '+r.name,
    r.desc,
    '',
    'INGREDIENTS'+(s>1?' (×'+s+')':''),
    ...r.i.map(g=>'  • '+(g.unit?Math.round(g.a*s)+' '+g.unit:oz(g.a*s))+' '+g.n),
    '',
    'HOW TO MAKE IT',
    ...r.steps.map((st,i)=>(i+1)+'. '+st),
    '',
    'Garnish: '+r.garnish,
    '',
    '— Made with Spirit Guide'
  ];
  const text=lines.join('\n');
  if(navigator.share){
    navigator.share({title:r.name,text}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      const btn=document.querySelector('[onclick="shareRecipe('+id+')"]');
      if(btn){btn.textContent='✓ Copied';setTimeout(()=>{btn.textContent='↗ Share';},1500);}
    });
  }
}


// ── TECHNIQUE GLOSSARY ────────────────────────────────────────
const TECHNIQUES=[
  {term:"Dry Shake",cat:"Technique",desc:"Shaking a cocktail WITHOUT ice first. Used when a recipe has egg white or aquafaba. The dry shake emulsifies the proteins and creates a thick, stable foam. After dry shaking 10–12 seconds, add ice and shake again for chilling and dilution."},
  {term:"Double Strain",cat:"Technique",desc:"Pouring through both a Hawthorne strainer AND a fine mesh strainer simultaneously. Catches ice chips, citrus pulp, and small herb fragments. Produces a crystal-clear drink with a clean mouthfeel. Essential for sours and anything with citrus."},
  {term:"Express / Expressed Peel",cat:"Garnish",desc:"Holding a citrus peel (lemon, orange, grapefruit) skin-side down over the drink and giving it a sharp bend. The pressure releases a fine mist of essential oils onto the surface of the cocktail, adding intense aroma. Then run the peel around the rim before dropping it in or discarding."},
  {term:"Stir, Don't Shake",cat:"Technique",desc:"Spirit-forward cocktails (Martinis, Manhattans, Negronis) should be stirred, not shaken. Stirring chills and dilutes without introducing air bubbles or cloudiness. Shaking bruises the spirit and changes the texture. Stir for 30 full seconds with large ice in a mixing glass."},
  {term:"Fat Wash",cat:"Technique",desc:"Infusing a spirit with a fat (butter, bacon fat, coconut oil, sesame oil) by combining them, letting them mingle, then freezing to solidify the fat and straining it out. The fat pulls flavor compounds into the spirit and leaves behind a silky texture. Classic example: brown butter bourbon."},
  {term:"Orgeat",cat:"Ingredient",desc:"A sweet syrup made from almonds, sugar, and orange flower water. Essential in tiki drinks like the Mai Tai. Has a rich, nutty, floral flavor with no alcohol. Can be substituted with almond syrup in a pinch, but the result will be simpler. Look for Small Hand Foods or Liquid Alchemist brands."},
  {term:"Simple Syrup",cat:"Ingredient",desc:"Sugar dissolved in water. Standard ratio is 1:1 (equal parts). Rich simple syrup is 2:1 sugar to water — sweeter and more viscous, better for cocktails where you want more sweetness with less dilution. Making it at home takes 2 minutes: combine and stir until dissolved. No heat necessary."},
  {term:"Honey Syrup",cat:"Ingredient",desc:"Honey thinned with warm water so it incorporates into cocktails without clumping. Standard ratio is 3:1 honey to water. Adds floral, complex sweetness that plain sugar can't replicate. Essential in the Bee's Knees and Penicillin. Different honeys (buckwheat, orange blossom, wildflower) change the character significantly."},
  {term:"Falernum",cat:"Ingredient",desc:"A sweet, spiced Caribbean syrup or liqueur with notes of almond, ginger, clove, and lime zest. Essential in many tiki cocktails. The alcoholic version (John D. Taylor's Velvet Falernum) is most common. Adds exotic, spiced depth. If unavailable, orgeat plus a dash of allspice dram is a loose approximation."},
  {term:"Float",cat:"Technique",desc:"Pouring a small amount of a spirit or wine over the back of a spoon held just above the surface of a drink, so it rests on top rather than mixing in. Creates a layered visual effect and a burst of that flavor on the first sip. Used for dark rum floats (Dark & Stormy), red wine floats (New York Sour), and Islay Scotch floats (Penicillin)."},
  {term:"Rinse",cat:"Technique",desc:"Pouring a small amount (typically ¼ oz) of a strongly flavored spirit or liqueur into a chilled glass, swirling to coat the interior, then discarding the excess before adding the main cocktail. Used classically in the Sazerac (absinthe rinse) to add aroma without overpowering. Leaves just a film of flavor."},
  {term:"Muddle",cat:"Technique",desc:"Pressing fresh ingredients (mint, citrus, berries, jalapeño) in the bottom of a glass or shaker using a muddler. For mint: press GENTLY to release oils — don't shred the leaves or it turns bitter. For citrus wedges: press firmly to release juice. For jalapeño: crush completely to release heat."},
  {term:"Demerara Syrup",cat:"Ingredient",desc:"Simple syrup made with Demerara sugar instead of white sugar. Has a richer, more complex molasses flavor with notes of toffee and caramel. 2:1 ratio is standard. Superior in rum cocktails, Old Fashioneds, and anything where you want more depth than plain syrup provides."},
  {term:"Mise en Place",cat:"Technique",desc:"A culinary term meaning 'everything in its place' — setting out all your bottles, tools, glasses, ice, garnishes, and measured ingredients before you start. Critical for batching or making multiple cocktails. A professional habit that prevents mistakes, forgotten ingredients, and having to hunt for something while your ice melts."},
  {term:"Build in Glass",cat:"Technique",desc:"Adding ingredients directly to the serving glass rather than a shaker or mixing glass. Used for highballs (Moscow Mule, Gin & Tonic), Old Fashioneds, and any drink where you want to preserve carbonation or keep things simple. Stir gently with a bar spoon rather than shaking."},
  {term:"Carbonation Preservation",cat:"Technique",desc:"When building a sparkling cocktail, always add the carbonated element last and pour slowly down the side of the glass. Never shake a carbonated ingredient. Stir only once or twice with a bar spoon. Use cold glassware. Ice should be large and dense — smaller ice melts faster and over-dilutes."},
  {term:"Chilling a Glass",cat:"Technique",desc:"Fill the serving glass with ice water (or put it in the freezer) while you make the drink. A cold glass keeps the cocktail colder longer and slightly slows dilution. Standard for Martinis, Manhattans, and anything served 'up' (without ice). Takes only 1–2 minutes with ice water — no advance planning needed."},
  {term:"Peychaud's vs Angostura",cat:"Ingredient",desc:"The two essential cocktail bitters. Angostura (from Trinidad) is dark, complex, herbal, with notes of clove and cinnamon — the standard for Old Fashioneds and Manhattans. Peychaud's (from New Orleans) is lighter, more floral and anise-forward, with a bright cherry note — essential in Sazeracs and Vieux Carrés. Keep both."},
];

function renderGlossary(){
  const el=document.getElementById('glossaryPanel');if(!el)return;
  const cats=[...new Set(TECHNIQUES.map(t=>t.cat))];
  let html='';
  cats.forEach(cat=>{
    const items=TECHNIQUES.filter(t=>t.cat===cat);
    html+=`<div style="margin-bottom:20px">
      <div class="sh" style="margin-bottom:10px">${cat}</div>
      ${items.map(t=>`<div style="background:rgba(18,12,4,0.7);border:1px solid rgba(196,122,42,0.15);border-radius:5px;padding:13px 14px;margin-bottom:8px">
        <div style="font-family:'Playfair Display',serif;font-size:15px;font-style:italic;margin-bottom:6px;color:var(--accent-light)">${t.term}</div>
        <div style="font-size:13px;line-height:1.65;color:#b8a898">${t.desc}</div>
      </div>`).join('')}
    </div>`;
  });
  el.innerHTML=html;
}
