<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spirit Guide">
<title>Spirit Guide</title>
<meta name="theme-color" content="#0a0804">
<link rel="apple-touch-icon" href="icon.png">>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0804;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);
  --text:#f0e6d3;--muted:#7a6548;--gold:#c47a2a;--accent:#c47a2a;--accent-light:#e8a24e;
  --dim:#130e06;--card-hover:rgba(196,122,42,0.1)
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);overflow-x:hidden}
body{background:var(--bg);padding-bottom:80px}
/* Noise texture overlay */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:2;opacity:1}
/* Deep atmospheric background */
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:80px;
  background:
    radial-gradient(ellipse 80% 50% at 15% 0%,#1a0e02 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 100%,#120800 0%,transparent 55%),
    radial-gradient(ellipse 40% 60% at 50% 50%,#1a1005 0%,transparent 70%),
    #0a0804;
  pointer-events:none;z-index:0}
#app{position:relative;z-index:1;isolation:auto}
button,input,textarea{font-family:'DM Sans',sans-serif}
.nav{display:flex;align-items:flex-end;justify-content:space-between;padding:54px 20px 0;border-bottom:none;position:relative;margin-bottom:0}
.nav-inner{flex:1}
.nav-eyebrow{font-size:8px;letter-spacing:7px;color:var(--accent-light);text-transform:uppercase;margin-bottom:6px;font-family:'DM Sans',sans-serif;font-weight:400}
.nav-logo{font-family:'Playfair Display',serif;font-size:34px;font-weight:400;font-style:italic;letter-spacing:1px;background:linear-gradient(135deg,#f0e6d3 0%,var(--accent-light) 50%,#c47a2a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:2px}
.nav-rule{height:1px;background:linear-gradient(90deg,var(--accent) 0%,rgba(196,122,42,0.3) 60%,transparent 100%);margin:10px 0 0;width:100%}
.nav-right{display:flex;gap:8px;padding-bottom:4px}
.icon-btn{width:36px;height:36px;border-radius:8px;background:rgba(196,122,42,0.1);border:1px solid rgba(196,122,42,0.25);color:var(--accent-light);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn.on{background:var(--gold);border-color:var(--accent);color:#e8ede9}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:9999;isolation:isolate;pointer-events:all;background:#090703 !important;border-top:1px solid rgba(196,122,42,0.2);display:flex;padding-bottom:env(safe-area-inset-bottom,6px);overflow-x:auto;scrollbar-width:none;box-shadow:0 -1px 40px rgba(0,0,0,0.95)}
.bottom-nav::-webkit-scrollbar{display:none}
.bnav-btn{position:relative;z-index:9999;flex:0 0 auto;min-width:58px;padding:9px 5px 7px;cursor:pointer;border:none;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s;font-size:8px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.bnav-btn.on{color:var(--accent-light)}
.bnav-icon{font-size:16px;line-height:1}
.page{display:none;padding:16px 15px 20px;max-width:900px;margin:0 auto;animation:fadeUp .22s ease;position:relative;z-index:1}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.sh{font-size:8px;letter-spacing:5px;color:var(--accent);text-transform:uppercase;margin-bottom:11px;font-weight:500}
.sh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.chips{display:flex;gap:5px;overflow-x:auto;margin-bottom:13px;padding-bottom:3px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:5px 14px;border-radius:4px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(196,122,42,0.2);background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;font-family:"DM Sans",sans-serif}
.chip.on{background:rgba(196,122,42,0.25);border-color:var(--accent);color:var(--accent-light);font-weight:500}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:10px;margin-bottom:16px}
.rcard{background:rgba(18,12,4,0.8);border:1px solid rgba(196,122,42,0.15);border-radius:6px;padding:15px 14px 12px;cursor:pointer;text-align:left;color:var(--text);transition:all .22s;width:100%;position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-light),transparent);opacity:0;transition:opacity .2s}
.rcard:hover::before,.rcard.active::before{opacity:1}
.rcard:hover{background:var(--card-hover);border-color:rgba(196,122,42,0.4)}
.rcard-dot{width:5px;height:5px;border-radius:50%;margin-bottom:9px}
.rcard-name{font-size:15px;font-weight:400;margin-bottom:3px;font-family:'Playfair Display',serif;letter-spacing:.2px;line-height:1.25}
.rcard-cat{font-size:9px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:2px}
.rcard-foot{display:flex;justify-content:space-between;align-items:center}
.badge{font-size:7px;padding:2px 7px;border-radius:3px;letter-spacing:1.5px;text-transform:uppercase;display:inline-block;font-weight:500}
.detail{background:rgba(18,12,4,0.9);border-radius:6px;overflow:hidden;border:1px solid rgba(196,122,42,0.2);margin-bottom:18px;animation:fadeUp .22s ease;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.detail-top{padding:17px 15px 13px;display:flex;justify-content:space-between;align-items:flex-start;gap:9px}
.detail-cat{font-size:8px;letter-spacing:5px;text-transform:uppercase;margin-bottom:4px}
.detail-name{font-family:'Playfair Display',serif;font-size:27px;font-weight:400;font-style:italic;letter-spacing:.3px;margin-bottom:3px;line-height:1.1}
.detail-desc{font-size:12px;color:#9ca3af;font-style:italic;margin-bottom:7px}
.detail-badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.steps{padding:0 15px 13px}
.step-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;line-height:1.7;color:#b8c8bc;padding-top:2px}
.ing-list{padding:0 15px 11px}
.ing-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:rgba(18,12,4,0.6);border-radius:4px;margin-bottom:4px;border:1px solid rgba(196,122,42,0.1)}
.ing-l{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ing-amt{font-weight:500;font-size:13px;text-align:right}
.ing-per{font-size:10px;color:var(--muted)}
.batch-s{margin:0 15px 11px;padding:11px 12px;background:rgba(18,12,4,0.5);border-radius:4px;border:1px solid rgba(196,122,42,0.1)}
.srv-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:7px}
.srv-btn{width:33px;height:33px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0}
.timer-ring{position:relative;width:56px;height:56px}
.timer-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:600}
.timer-lbl{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;text-align:center}
.divider{border:none;border-top:1px solid var(--border)}
.two-col{display:grid;grid-template-columns:1fr 1fr}
.tcell{padding:11px 15px}
.tcell:first-child{border-right:1px solid var(--border)}
.tcell-label{font-size:7px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:5px;font-weight:500}
.tcell-text{font-size:12px;line-height:1.6;color:#d4cfc6}
.shop-box{margin:0 15px 11px;padding:11px;background:rgba(196,122,42,0.08);border:1px solid rgba(196,122,42,0.3);border-radius:4px}
.log-s{padding:11px 15px;border-top:1px solid var(--border)}
.log-entry{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.log-entry:last-child{border:none}
.log-note{font-size:11px;color:#9ca3af;font-style:italic;line-height:1.5;margin-top:2px}
textarea{background:rgba(18,12,4,0.8);border:1px solid rgba(196,122,42,0.2);border-radius:4px;padding:8px 10px;color:var(--text);font-size:12px;resize:none;outline:none;width:100%}
.bar-grid{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.bar-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:4px;cursor:pointer;color:var(--text);text-align:left;transition:all .15s;width:100%;border:1px solid rgba(196,122,42,0.12);background:rgba(18,12,4,0.5)}
.mkgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}
.mkcard{border-radius:5px;padding:13px;cursor:pointer;text-align:left;color:var(--text);width:100%;border:1px solid transparent;transition:all .2s}
.cust-wrap{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.name-inp{background:rgba(18,12,4,0.8);border:1px solid rgba(196,122,42,0.25);border-radius:4px;padding:8px 10px;color:var(--text);font-size:14px;width:100%;outline:none;margin-top:4px}
.qty-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:rgba(18,12,4,0.6);border-radius:4px;margin-bottom:4px;border:1px solid rgba(196,122,42,0.1)}
.qty-ctrl{display:flex;align-items:center;gap:5px}
.qty-btn{width:25px;height:25px;border-radius:50%;background:rgba(255,255,255,0.09);border:none;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-val{font-weight:500;font-size:13px;color:var(--gold);min-width:34px;text-align:center}
.save-btn{width:100%;padding:10px;border-radius:8px;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border:none;margin-top:5px}
.empty{text-align:center;padding:24px 11px;color:var(--muted);font-style:italic;font-size:12px;border:1px dashed rgba(255,255,255,0.08);border-radius:10px;line-height:1.5;margin-bottom:7px}
.swrap{position:relative;margin-bottom:11px}
.sinput{width:100%;padding:10px 12px 10px 35px;background:rgba(18,12,4,0.8);border:1px solid rgba(196,122,42,0.2);border-radius:5px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}.sinput:focus{border-color:var(--accent)}
.sicon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.saved-card{display:flex;justify-content:space-between;align-items:center;padding:13px;background:rgba(18,12,4,0.7);border-radius:5px;margin-bottom:8px;border:1px solid rgba(196,122,42,0.15);transition:all .2s}
button{-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;cursor:pointer;}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(196,122,42,0.3);border-radius:2px}
</style>
</head>
<body>
<div id="app">
<div class="nav">
  <div class="nav-inner">
    <div class="nav-eyebrow">Anthony's Bar Cart</div>
    <div class="nav-logo">Spirit Guide</div>
    <div class="nav-rule"></div>
  </div>
  <div class="nav-right">
    <button class="icon-btn" id="surpriseBtn">🎲</button>
  </div>
</div>

<div class="page on" id="page-discover">
  <div id="cotdPanel" style="margin-bottom:16px"></div>
  <div class="swrap"><span class="sicon">🔍</span><input class="sinput" id="searchInput" placeholder="Search by name, spirit, or ingredient..." oninput="filterSearch()"></div>
  <div class="chips" id="catChips"></div>
  <div style="display:flex;gap:6px;margin:8px 0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px" id="diffChips">
    <button class="chip on" onclick="setDiscDiff(0)" style="white-space:nowrap;flex-shrink:0">All Levels</button>
    <button class="chip" onclick="setDiscDiff(1)" style="white-space:nowrap;flex-shrink:0">⭐ Easy</button>
    <button class="chip" onclick="setDiscDiff(2)" style="white-space:nowrap;flex-shrink:0">⭐⭐ Medium</button>
    <button class="chip" onclick="setDiscDiff(3)" style="white-space:nowrap;flex-shrink:0">⭐⭐⭐ Complex</button>
  </div>
  <div id="recentSection" style="margin-bottom:14px"></div>
  <div class="recipe-grid" id="discoverGrid"></div>
  <div id="discoverDetail"></div>
</div>
<div class="page" id="page-spirits">
  <div class="swrap" style="margin-bottom:10px"><span class="sicon">🔍</span><input class="sinput" id="spiritSearchInput" placeholder="Search by name or ingredient..." oninput="filterSpiritSearch()"></div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px" id="spiritTabBtns">
    <button class="chip on" data-spirit="all" onclick="setSpiritTab('all')">All Spirits</button>
    <button class="chip" data-spirit="Gin" onclick="setSpiritTab('Gin')">🌿 Gin</button>
    <button class="chip" data-spirit="Tequila" onclick="setSpiritTab('Tequila')">🌵 Tequila</button>
    <button class="chip" data-spirit="Vodka" onclick="setSpiritTab('Vodka')">❄️ Vodka</button>
    <button class="chip" data-spirit="Whiskey" onclick="setSpiritTab('Whiskey')">🥃 Whiskey</button>
    <button class="chip" data-spirit="Rum" onclick="setSpiritTab('Rum')">🏝️ Rum</button>
    <button class="chip" data-spirit="Brandy" onclick="setSpiritTab('Brandy')">🍷 Brandy</button>
    <button class="chip" data-spirit="Sake" onclick="setSpiritTab('Sake')">🍶 Sake</button>
  </div>
  <div class="chips" id="spiritCatChips"></div>
  <div class="recipe-grid" id="spiritsGrid"></div>
  <div id="spiritsDetail"></div>
</div><div class="page" id="page-bar">
  <div class="sh-row" style="align-items:center">
    <div style="flex:1">
      <div class="sh" style="margin:0">My Bar</div>
      <span id="barCount" style="font-size:10px;color:var(--muted)"></span>
    </div>
    <button onclick="document.getElementById('mkSection').scrollIntoView({behavior:'smooth',block:'start'})" style="background:rgba(196,122,42,0.15);border:1px solid rgba(196,122,42,0.3);border-radius:4px;color:var(--accent-light);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 12px;cursor:pointer;white-space:nowrap">Make Tonight ↓</button>
  </div>
  <div class="swrap" style="margin-bottom:10px"><span class="sicon">🔍</span><input class="sinput" id="barSearch" placeholder="Filter ingredients..." oninput="renderBar()"></div>
  <div id="addIngPanel" style="margin-bottom:12px">
    <div style="display:flex;gap:7px;align-items:center">
      <input id="newIngName" class="sinput" style="flex:1;padding:9px 12px" placeholder="Add custom ingredient..." onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomIng();}">
      <select id="newIngType" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:9px 10px;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;-webkit-appearance:none;appearance:none;min-width:90px">
        <option value="spirit">Spirit</option>
        <option value="liqueur">Liqueur</option>
        <option value="syrup">Syrup</option>
        <option value="juice">Juice</option>
        <option value="mixer">Mixer</option>
        <option value="bitters">Bitters</option>
        <option value="vermouth">Vermouth</option>
        <option value="cream">Cream</option>
        <option value="other">Other</option>
      </select>
      <button id="addIngBtn" onclick="addCustomIng()" style="background:var(--gold);border:none;border-radius:10px;color:#f0e6d3;font-size:11px;font-weight:500;letter-spacing:1px;padding:9px 14px;white-space:nowrap;cursor:pointer">+ Add</button>
    </div>
  </div>
  <div class="bar-grid" id="barGrid"></div><div id="mkSection" class="sh-row" style="margin-top:3px"><div class="sh" style="margin:0">Can Make Tonight</div><span id="mkCount" style="font-size:10px;color:var(--accent-light)"></span></div><div class="mkgrid" id="mkGrid"></div></div>
<div class="page" id="page-generator">

  <div id="genPanel"></div>
</div>
<div class="page" id="page-saved">
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button class="chip on" id="savedTabRecipes" onclick="setSavedTab('recipes')">My Recipes</button>
    <button class="chip" id="savedTabParty" onclick="setSavedTab('party')">🎉 Party Planner</button>
    <button class="chip" id="savedTabShop" onclick="setSavedTab('shop')">🛒 Shop</button>
    <button class="chip" id="savedTabGlossary" onclick="setSavedTab('glossary')">📖 Techniques</button>
  </div>
  <div id="savedList"></div>
  <div id="partyPlanner" style="display:none"></div>
  <div id="glossaryPanel" style="display:none"></div>
</div>

</div>
<div class="bottom-nav">
  <button class="bnav-btn on"  data-page="discover"><span class="bnav-icon">🍸</span>All</button>
  <button class="bnav-btn"     data-page="spirits"><span class="bnav-icon">🍾</span>Spirits</button>
  <button class="bnav-btn"     data-page="bar"><span class="bnav-icon">🧊</span>My Bar</button>
  <button class="bnav-btn"     data-page="generator"><span class="bnav-icon">🪄</span>Generate</button>
  <button class="bnav-btn"     data-page="saved"><span class="bnav-icon">📖</span>Saved</button>
</div>

<script>
// ── LOOKUPS ──────────────────────────────────────────────────
const TC={spirit:"#94a3b8",liqueur:"#a78bfa",coffee:"#a16207",syrup:"#c084fc",cream:"#fbbf24",juice:"#6ee7b7",bitters:"#f87171",vermouth:"#86efac",mixer:"#67e8f9",other:"#e5e7eb"};
const TL={spirit:"Spirit",liqueur:"Liqueur",coffee:"Coffee",syrup:"Syrup",cream:"Cream",juice:"Juice",bitters:"Bitters",vermouth:"Vermouth",mixer:"Mixer",other:"Other"};
const FR={0.25:"¼",0.33:"⅓",0.5:"½",0.67:"⅔",0.75:"¾"};
function oz(n){const w=Math.floor(n),f=Math.round((n-w)*100)/100,fs=FR[f]||(f>0?parseFloat(f.toFixed(2)):"");return w===0?(fs||n)+" oz":(!fs?w+" oz":w+" "+fs+" oz");}
function strs(r,z=12){return[1,2,3,4,5].map(s=>`<span style="color:${s<=r?"#f59e0b":"#2d2d2d"};font-size:${z}px">★</span>`).join("");}
const DC={1:"#c47a2a",2:"#e8a24e",3:"#ef4444"};const DL={1:"Easy",2:"Medium",3:"Advanced"};
// ── ABV LOOKUP ───────────────────────────────────────────────
const ABV={
  spirit:{gin:40,vodka:40,bourbon:45,rye:45,whiskey:43,scotch:43,rum:40,tequila:40,mezcal:40,cognac:40,brandy:40,pisco:42,calvados:40,sake:15,default:40},
  liqueur:{campari:25,aperol:11,cointreau:40,kahlúa:20,'tia maria':20,'mr. black':23,chartreuse:55,'crème de':20,amaretto:25,limoncello:28,bénédictine:40,maraschino:32,cynar:16,'st-germain':20,elderflower:20,licor:31,mozart:15,default:20},
  vermouth:{sweet:16,dry:18,default:17},
  wine:13,beer:5,default:0
};

function getABV(ingName,ingType){
  const n=ingName.toLowerCase();
  if(ingType==='spirit'){
    for(const[k,v] of Object.entries(ABV.spirit)){if(n.includes(k))return v;}
    return ABV.spirit.default;
  }
  if(ingType==='liqueur'){
    for(const[k,v] of Object.entries(ABV.liqueur)){if(n.includes(k))return v;}
    return ABV.liqueur.default;
  }
  if(ingType==='vermouth'){
    for(const[k,v] of Object.entries(ABV.vermouth)){if(n.includes(k))return v;}
    return ABV.vermouth.default;
  }
  return 0;
}

function calcABV(recipe, servings){
  const s=servings||1;
  let alcoholOz=0, totalOz=0;
  recipe.i.forEach(ing=>{
    const amt=(ing.a||0)*s;
    const abv=getABV(ing.n,ing.t)/100;
    alcoholOz+=amt*abv;
    totalOz+=amt;
  });
  if(!totalOz)return null;
  // Dilution from shaking/stirring (~20-25%)
  const diluted=totalOz*(recipe.shake>0?1.2:1.15);
  return Math.round((alcoholOz/diluted)*100);
}

{id:50,base:"Vodka",cat:"Classic",name:"Moscow Mule",desc:"Vodka, ginger beer, lime — in a copper mug",rating:4,diff:1,shake:0,
 i:[{n:"Vodka",a:2,t:"spirit"},{n:"Ginger Beer",a:4,t:"mixer"},{n:"Fresh Lime Juice",a:0.5,t:"juice"}],
 steps:["Fill a copper mug with crushed ice.","Add vodka and lime juice.","Top with ginger beer. Stir gently.","Garnish with a lime wedge and mint sprig."],
 garnish:"Lime wedge + mint sprig",tip:"Use a spicy ginger beer (Fever-Tree, Bundaberg). The copper mug keeps it colder and adds to the experience — it's not just aesthetic."},

{id:51,base:"Vodka",cat:"Classic",name:"Cosmopolitan",desc:"Cranberry, Cointreau, citrus — forever iconic",rating:4,diff:1,shake:15,
 i:[{n:"Vodka",a:1.5,t:"spirit"},{n:"Cointreau",a:0.5,t:"liqueur"},{n:"Cranberry Juice",a:0.5,t:"juice"},{n:"Fresh Lime Juice",a:0.25,t:"juice"}],
 steps:["Shake all with ice 15 seconds.","Strain into a chilled martini glass.","Garnish with an expressed orange peel."],
 garnish:"Expressed orange peel",tip:"The Cosmopolitan deserves better than its reputation. Made properly with fresh lime and quality cranberry juice, it's genuinely elegant."},

// ── WHISKEY ──────────────────────────────────────────────────
{id:60,base:"Whiskey",cat:"Classic",name:"Old Fashioned",desc:"Whiskey, sugar, bitters. The original cocktail.",rating:5,diff:1,shake:30,
 i:[{n:"Bourbon",a:2,t:"spirit"},{n:"Simple Syrup",a:0.25,t:"syrup"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"}],
 steps:["Add simple syrup and bitters to a rocks glass.","Add one large ice cube — bigger ice means slower dilution.","Pour in bourbon.","Stir gently in the glass 20–30 seconds.","Express a wide orange peel over the top, rim the glass, place it in.","Optional: Luxardo cherry."],
 garnish:"Orange peel + optional Luxardo cherry",tip:"Four Roses Single Barrel or Woodford Reserve are ideal. Don't muddle the orange. The old fashioned rewards restraint."},

{id:61,base:"Whiskey",cat:"Classic",name:"Rye Old Fashioned",desc:"Rye whiskey adds spice and pepper — drier, sharper",rating:5,diff:1,shake:30,
 i:[{n:"Rye Whiskey",a:2,t:"spirit"},{n:"Simple Syrup",a:0.25,t:"syrup"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"},{n:"Orange Bitters",a:1,t:"bitters",unit:"dash"}],
 steps:["Add syrups and bitters to a rocks glass.","Add large ice cube and pour rye.","Stir gently 25 seconds.","Express orange peel and drop in."],
 garnish:"Orange peel",tip:"Rye's spice — black pepper, caraway, dill — makes a more complex, drier Old Fashioned than bourbon. Rittenhouse Rye is excellent here."},

{id:62,base:"Whiskey",cat:"Classic",name:"Maple Old Fashioned",desc:"Maple syrup replaces sugar — richer and more complex",rating:4,diff:1,shake:30,
 i:[{n:"Bourbon",a:2,t:"spirit"},{n:"Maple Syrup",a:0.25,t:"syrup"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"}],
 steps:["Add maple syrup and bitters to a rocks glass.","Add large ice cube and bourbon.","Stir gently 25 seconds.","Express orange peel and drop in."],
 garnish:"Orange peel",tip:"Use Grade B (dark) maple syrup — deeper and more complex than Grade A. The caramel and vanilla of bourbon amplify the maple beautifully."},

{id:63,base:"Whiskey",cat:"Classic",name:"Smoked Old Fashioned",desc:"Cherry wood smoke adds drama and incredible depth",rating:5,diff:3,shake:30,
 i:[{n:"Bourbon",a:2,t:"spirit"},{n:"Simple Syrup",a:0.25,t:"syrup"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"},{n:"Cherry Wood",a:1,t:"other",unit:"chip"}],
 steps:["Build an Old Fashioned in a rocks glass over a large cube.","Using a smoking gun or burning cherry wood chip, trap smoke under an overturned glass.","Place the glass over the drink for 10 seconds.","Lift and immediately present — serve before the smoke dissipates."],
 garnish:"Smoked orange peel",tip:"Cherry or applewood complement bourbon. Don't over-smoke — 10 seconds is plenty. The theater is part of the experience."},

{id:64,base:"Whiskey",cat:"Classic",name:"Whiskey Sour",desc:"Bourbon, lemon, egg white. Silky and balanced.",rating:5,diff:2,shake:15,
 i:[{n:"Bourbon",a:2,t:"spirit"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.75,t:"syrup"},{n:"Egg White",a:1,t:"other",unit:"white"}],
 steps:["Dry shake all without ice 12 seconds to emulsify the egg white.","Add ice. Shake hard 15 more seconds.","Strain into a rocks glass over ice or a chilled coupe.","Optional: dot Angostura bitters on the foam and swirl.","Garnish with cherry and orange slice."],
 garnish:"Luxardo cherry + orange slice",tip:"The dry shake first is the secret to silky foam — don't skip it. Aquafaba (chickpea liquid) works as a vegan egg white substitute."},

{id:65,base:"Whiskey",cat:"Classic",name:"New York Sour",desc:"Whiskey sour with a red wine float — dramatic and delicious",rating:5,diff:2,shake:15,
 i:[{n:"Bourbon",a:2,t:"spirit"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.75,t:"syrup"},{n:"Egg White",a:1,t:"other",unit:"white"},{n:"Dry Red Wine",a:0.5,t:"other",unit:"float"}],
 steps:["Dry shake bourbon, lemon, syrup, and egg white 12 seconds.","Add ice. Shake hard 15 more seconds.","Strain into a rocks glass over a large cube.","Slowly float red wine over the back of a spoon on top.","The wine creates a beautiful dark red layer over the foam."],
 garnish:"Red wine float",tip:"Use Malbec, Côtes du Rhône, or Grenache. The float adds tannin and fruit. It looks extraordinary and tastes even better."},

{id:66,base:"Whiskey",cat:"Stirred",name:"Manhattan",desc:"Whiskey, vermouth, bitters. Stirred, never shaken.",rating:5,diff:1,shake:30,
 i:[{n:"Rye Whiskey",a:2,t:"spirit"},{n:"Sweet Vermouth",a:1,t:"vermouth"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"}],
 steps:["Fill a mixing glass with ice.","Add rye, sweet vermouth, and bitters.","Stir 30 seconds until cold and diluted.","Strain into a chilled coupe or Nick & Nora glass.","Garnish with a Luxardo cherry."],
 garnish:"Luxardo cherry",tip:"Rye is traditional and gives the Manhattan its characteristic spice. Carpano Antica for vermouth is non-negotiable for the best results."},

{id:67,base:"Whiskey",cat:"Stirred",name:"Rob Roy",desc:"Manhattan with Scotch — smoky, peaty, elegant",rating:4,diff:1,shake:30,
 i:[{n:"Scotch Whisky",a:2,t:"spirit"},{n:"Sweet Vermouth",a:1,t:"vermouth"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"}],
 steps:["Fill mixing glass with ice.","Add Scotch, vermouth, and bitters.","Stir 30 seconds.","Strain into chilled coupe.","Garnish with cherry or lemon twist."],
 garnish:"Luxardo cherry or lemon twist",tip:"A blended Scotch works well (Dewar's). A lightly peated single malt transforms it. Don't use a heavily peated Islay Scotch — it overwhelms the vermouth."},

{id:68,base:"Whiskey",cat:"Stirred",name:"Black Manhattan",desc:"Averna replaces vermouth — bitter, complex, deeper",rating:5,diff:1,shake:30,
 i:[{n:"Rye Whiskey",a:2,t:"spirit"},{n:"Averna Amaro",a:1,t:"liqueur"},{n:"Angostura Bitters",a:1,t:"bitters",unit:"dash"},{n:"Orange Bitters",a:1,t:"bitters",unit:"dash"}],
 steps:["Fill mixing glass with ice.","Add rye, Averna, and both bitters.","Stir 30 seconds.","Strain into chilled coupe.","Garnish with a Luxardo cherry."],
 garnish:"Luxardo cherry",tip:"Averna is a Sicilian amaro with citrus, herbs, and chocolate notes. It deepens the Manhattan into something richer and more interesting than the original."},

{id:69,base:"Whiskey",cat:"Highball",name:"Whiskey Highball",desc:"Whiskey and sparkling water. Japanese precision.",rating:5,diff:1,shake:0,
 i:[{n:"Japanese Whisky",a:2,t:"spirit"},{n:"Sparkling Water",a:4,t:"mixer"}],
 steps:["Chill a highball glass in the freezer until frosted.","Fill with as much large, clear ice as possible.","Pour whisky slowly over the ice.","Pour sparkling water gently and slowly — preserve every bubble.","Stir once, gently, from bottom to top.","Garnish with a lemon peel twist."],
 garnish:"Lemon peel twist",tip:"The Japanese highball is an art form — extreme chilling, maximum ice, gentle pour. Suntory Toki is the classic choice. This technique works beautifully with any quality whisky."},

{id:70,base:"Whiskey",cat:"Classic",name:"Hot Toddy",desc:"Whiskey, honey, lemon, hot water — winter in a mug",rating:4,diff:1,shake:0,
 i:[{n:"Whiskey",a:1.5,t:"spirit"},{n:"Honey",a:1,t:"syrup",unit:"tbsp"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"},{n:"Hot Water",a:4,t:"mixer"}],
 steps:["Add honey and lemon juice to a mug.","Pour in whiskey.","Top with hot (not boiling) water — about 160°F.","Stir until honey dissolves completely.","Garnish with a lemon wheel and cinnamon stick."],
 garnish:"Lemon wheel + cinnamon stick",tip:"Use an Irish pot still whiskey (Jameson, Redbreast) for the most soothing version. A couple of cloves in the mug deepen the winter spice beautifully."},

// ── RUM ──────────────────────────────────────────────────────
{id:80,base:"Rum",cat:"Classic",name:"Daiquiri",desc:"Rum, lime, sugar. Three ingredients. Completely flawless.",rating:5,diff:1,shake:15,
 i:[{n:"White Rum",a:2,t:"spirit"},{n:"Fresh Lime Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.75,t:"syrup"}],
 steps:["Chill a coupe glass.","Shake rum, lime, and syrup hard with ice 15 seconds.","Double strain into chilled coupe.","Garnish with a lime wheel or expressed lime peel."],
 garnish:"Lime wheel or lime peel",tip:"The daiquiri exposes cheap rum immediately. Use Plantation 3 Star, Bacardi Superior, or Flor de Caña. Fresh lime only, always."},

{id:81,base:"Rum",cat:"Classic",name:"Hemingway Daiquiri",desc:"The double daiquiri — grapefruit, maraschino, drier",rating:5,diff:2,shake:15,
 i:[{n:"White Rum",a:2,t:"spirit"},{n:"Maraschino Liqueur",a:0.5,t:"liqueur"},{n:"Fresh Lime Juice",a:0.75,t:"juice"},{n:"Fresh Grapefruit Juice",a:0.5,t:"juice"}],
 steps:["Shake all with ice 15 seconds.","Double strain into chilled coupe."],
 garnish:"None or lime wheel",tip:"Also called the Papa Doble. No syrup — Hemingway liked it dry. Maraschino adds cherry and almond notes without sweetness. The original at El Floridita, Havana."},

{id:82,base:"Rum",cat:"Classic",name:"Banana Daiquiri",desc:"Fresh banana adds tropical depth to the classic",rating:4,diff:2,shake:15,
 i:[{n:"White Rum",a:2,t:"spirit"},{n:"Banana Liqueur",a:0.5,t:"liqueur"},{n:"Fresh Lime Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.5,t:"syrup"}],
 steps:["Muddle ¼ ripe banana in shaker.","Add rum, banana liqueur, lime, syrup, and ice.","Shake hard 15 seconds.","Double strain into chilled coupe.","Garnish with a banana chip."],
 garnish:"Banana chip + lime wheel",tip:"Use a ripe, spotty banana for maximum flavor. Muddle well and don't skip the banana liqueur — it amplifies without overpowering the rum."},

{id:83,base:"Rum",cat:"Classic",name:"Strawberry Daiquiri",desc:"Fresh strawberries, summer in a coupe",rating:4,diff:2,shake:15,
 i:[{n:"White Rum",a:2,t:"spirit"},{n:"Fresh Lime Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.5,t:"syrup"},{n:"Fresh Strawberries",a:3,t:"other",unit:"berries"}],
 steps:["Muddle fresh strawberries in shaker.","Add rum, lime, syrup, and ice.","Shake hard 15 seconds.","Double strain into chilled coupe.","Garnish with a half strawberry on the rim."],
 garnish:"Fresh strawberry half",tip:"Fresh strawberries only — never puree or extract. Hull and quarter before muddling. The natural acidity of fresh berries is what makes it bright."},

{id:84,base:"Rum",cat:"Highball",name:"Mojito",desc:"Mint, lime, rum, soda. The definitive summer drink.",rating:5,diff:2,shake:0,
 i:[{n:"White Rum",a:2,t:"spirit"},{n:"Fresh Lime Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.75,t:"syrup"},{n:"Fresh Mint",a:8,t:"other",unit:"leaves"},{n:"Club Soda",a:2,t:"mixer"}],
 steps:["Add mint and syrup to a Collins glass.","Clap the mint between your palms — don't muddle hard, which makes it bitter.","Add lime juice and rum.","Fill with crushed ice.","Top with club soda. Churn gently.","Garnish with a large mint bouquet and lime wheel."],
 garnish:"Mint bouquet + lime wheel",tip:"Clapping mint releases oils without tearing the leaves and causing bitterness. Fresh mint is everything here — don't use dried."},

{id:85,base:"Rum",cat:"Highball",name:"Dark & Stormy",desc:"Dark rum float over ginger beer — nautical classic",rating:4,diff:1,shake:0,
 i:[{n:"Dark Rum",a:2,t:"spirit"},{n:"Ginger Beer",a:4,t:"mixer"},{n:"Fresh Lime Juice",a:0.5,t:"juice"}],
 steps:["Fill a highball glass with ice.","Add lime juice and ginger beer.","Float dark rum over the back of a spoon — pour very slowly.","Garnish with a lime wedge."],
 garnish:"Lime wedge",tip:"Gosling's Black Seal rum is the original — actually trademarked for the Dark & Stormy. The float hits you with rum on first sip and gradually mixes as you drink."},

{id:86,base:"Rum",cat:"Highball",name:"Cuba Libre",desc:"Rum and Coke with fresh lime — much better than it sounds",rating:4,diff:1,shake:0,
 i:[{n:"White Rum",a:2,t:"spirit"},{n:"Coca-Cola",a:4,t:"mixer"},{n:"Fresh Lime Juice",a:0.5,t:"juice"}],
 steps:["Fill a highball glass with ice.","Add rum and lime juice.","Top with Coca-Cola. Stir gently.","Garnish with a lime wedge."],
 garnish:"Lime wedge",tip:"Fresh lime juice is what separates a Cuba Libre from a rum and Coke. Use Mexican Coke (cane sugar, not HFCS) for the best version."},

{id:87,base:"Rum",cat:"Tropical",name:"Mai Tai",desc:"The benchmark tiki drink. The one to get right.",rating:5,diff:3,shake:15,
 i:[{n:"Aged Rum",a:1,t:"spirit"},{n:"Dark Rum",a:1,t:"spirit"},{n:"Cointreau",a:0.75,t:"liqueur"},{n:"Fresh Lime Juice",a:1,t:"juice"},{n:"Orgeat Syrup",a:0.5,t:"syrup"}],
 steps:["Shake both rums, Cointreau, lime juice, and orgeat with crushed ice 10 seconds.","Pour unstrained into a tiki mug or rocks glass — ice and all.","Add more crushed ice to mound above the glass.","Garnish with a spent lime shell, mint bouquet, and cherry."],
 garnish:"Mint bouquet + lime shell + cherry",tip:"Orgeat (almond-orange flower syrup) is what makes a Mai Tai — never substitute. Trader Vic's original used aged Jamaican rum. Never add pineapple juice."},

{id:88,base:"Rum",cat:"Tropical",name:"Piña Colada",desc:"Rum, coconut, pineapple. A classic for a reason.",rating:4,diff:2,shake:0,
 i:[{n:"White Rum",a:2,t:"spirit"},{n:"Coconut Cream",a:2,t:"cream"},{n:"Pineapple Juice",a:4,t:"juice"}],
 steps:["Blend all with 1 cup of crushed ice until smooth.","Pour into a chilled hurricane glass.","Garnish with a pineapple wedge, cherry, and umbrella."],
 garnish:"Pineapple wedge + cherry + umbrella",tip:"Coco Lopez is the classic coconut cream. Don't use coconut milk — the fat content is wrong. A squeeze of fresh lime brightens the whole drink."},

{id:89,base:"Rum",cat:"Tropical",name:"Jungle Bird",desc:"Campari and rum with pineapple — unexpectedly brilliant",rating:5,diff:2,shake:15,
 i:[{n:"Dark Rum",a:1.5,t:"spirit"},{n:"Campari",a:0.75,t:"liqueur"},{n:"Pineapple Juice",a:1.5,t:"juice"},{n:"Fresh Lime Juice",a:0.5,t:"juice"},{n:"Simple Syrup",a:0.5,t:"syrup"}],
 steps:["Shake all with ice 15 seconds.","Strain over ice in a rocks glass.","Garnish with a pineapple wedge."],
 garnish:"Pineapple wedge",tip:"The bitterness of Campari against sweet pineapple and funky rum is one of cocktailing's great surprises. Use Appleton Estate for the rum."},

{id:90,base:"Rum",cat:"Punch",name:"Rum Punch",desc:"Caribbean party punch — scales beautifully",rating:4,diff:1,shake:0,
 i:[{n:"Dark Rum",a:2,t:"spirit"},{n:"Pineapple Juice",a:2,t:"juice"},{n:"Orange Juice",a:2,t:"juice"},{n:"Fresh Lime Juice",a:0.5,t:"juice"},{n:"Grenadine",a:0.25,t:"syrup"}],
 steps:["Combine all in a pitcher or punch bowl.","Stir well. Serve over ice.","Garnish with citrus wheels and a cherry."],
 garnish:"Citrus wheels + cherry",tip:"The Caribbean formula: one of sour, two of sweet, three of strong, four of weak. Scale by any factor. Float dark rum on top before serving for dramatic effect."},

// ── BRANDY / APERITIVO ──────────────────────────────────────
{id:100,base:"Brandy",cat:"Classic",name:"Sidecar",desc:"Cognac, Cointreau, lemon. French elegance in a coupe.",rating:5,diff:2,shake:15,
 i:[{n:"Cognac",a:2,t:"spirit"},{n:"Cointreau",a:0.75,t:"liqueur"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"}],
 steps:["Sugar-rim the coupe by running a lemon wedge around the edge and pressing into sugar.","Shake all with ice 15 seconds.","Double strain into the chilled sugar-rimmed coupe.","Garnish with an expressed orange peel."],
 garnish:"Sugar rim + orange peel",tip:"The ratio is everything — equal parts makes it too sour, 2:1:1 is the sweet spot. Use VS or VSOP Cognac. Rémy Martin or Hennessy are both excellent."},

{id:101,base:"Brandy",cat:"Classic",name:"Brandy Alexander",desc:"Cognac, dark crème de cacao, cream — rich and indulgent",rating:4,diff:1,shake:15,
 i:[{n:"Cognac",a:1.5,t:"spirit"},{n:"Dark Crème de Cacao",a:1,t:"liqueur"},{n:"Heavy Cream",a:1,t:"cream"}],
 steps:["Shake all with ice 15 seconds.","Double strain into a chilled coupe.","Dust generously with freshly grated nutmeg."],
 garnish:"Fresh grated nutmeg",tip:"The nutmeg isn't decoration — it's essential. Grate it fresh over the top right before serving. Use whole nutmeg and a microplane."},

{id:102,base:"Brandy",cat:"Classic",name:"Corpse Reviver No. 1",desc:"The original morning-after cure — brandy and apple brandy",rating:4,diff:1,shake:30,
 i:[{n:"Cognac",a:1.5,t:"spirit"},{n:"Apple Brandy",a:0.75,t:"spirit"},{n:"Sweet Vermouth",a:0.75,t:"vermouth"}],
 steps:["Combine all in a mixing glass with ice.","Stir 30 seconds.","Strain into a chilled coupe.","Garnish with a lemon twist."],
 garnish:"Lemon twist",tip:"The older of two Corpse Revivers. Apple brandy adds orchard fruit and sweetness. Calvados is the gold standard apple brandy here."},

{id:103,base:"Brandy",cat:"Classic",name:"Vieux Carré",desc:"New Orleans classic — rye, cognac, vermouth, Bénédictine",rating:5,diff:2,shake:30,
 i:[{n:"Rye Whiskey",a:0.75,t:"spirit"},{n:"Cognac",a:0.75,t:"spirit"},{n:"Sweet Vermouth",a:0.75,t:"vermouth"},{n:"Bénédictine",a:0.25,t:"liqueur"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"},{n:"Peychaud's Bitters",a:2,t:"bitters",unit:"dashes"}],
 steps:["Fill a rocks glass with one large cube.","Add all ingredients directly to the glass.","Stir gently 20 seconds.","Garnish with a lemon twist and cherry."],
 garnish:"Lemon twist + cherry",tip:"Created at the Carousel Bar in New Orleans' Hotel Monteleone. Built in the glass, not a mixing glass. The Bénédictine adds an herbal honey note that ties everything together."},

{id:104,base:"Brandy",cat:"Sour",name:"Pisco Sour",desc:"South American brandy, egg white foam, Angostura art",rating:5,diff:2,shake:15,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Fresh Lime Juice",a:1,t:"juice"},{n:"Simple Syrup",a:0.75,t:"syrup"},{n:"Egg White",a:1,t:"other",unit:"white"}],
 steps:["Dry shake all without ice 12 seconds.","Add ice. Shake hard 15 seconds.","Strain into a chilled coupe.","Dot 3 drops of Angostura bitters on the foam.","Use a toothpick to drag a pattern through the dots."],
 garnish:"Angostura bitters pattern on foam",tip:"Pisco is an unaged grape brandy from Peru and Chile. Peruvian Pisco (Quebranta grape) is fruitier; Chilean is more neutral. The foam decoration is a tradition — don't skip it."},

{id:105,base:"Brandy",cat:"Highball",name:"Calvados & Soda",desc:"Apple brandy highball — orchard fresh, incredibly easy",rating:4,diff:1,shake:0,
 i:[{n:"Calvados",a:2,t:"spirit"},{n:"Club Soda",a:4,t:"mixer"},{n:"Fresh Lemon Juice",a:0.25,t:"juice"}],
 steps:["Fill a highball glass with ice.","Add Calvados and lemon juice.","Top gently with club soda.","Garnish with a thin apple slice."],
 garnish:"Thin apple slice",tip:"Calvados is aged apple brandy from Normandy, France. The soda format makes its apple and vanilla notes incredibly fresh. A squeeze of lemon keeps it bright."},

{id:106,base:"Brandy",cat:"Classic",name:"Stinger",desc:"Cognac and white crème de menthe — bracingly refreshing",rating:4,diff:1,shake:15,
 i:[{n:"Cognac",a:2,t:"spirit"},{n:"White Crème de Menthe",a:0.75,t:"liqueur"}],
 steps:["Shake both with ice 15 seconds.","Strain into a chilled coupe or over crushed ice.","No garnish needed."],
 garnish:"None or mint sprig",tip:"A classic digestif. The mint cuts right through the richness of cognac. Serve very cold — it should be almost slushy on crushed ice."},

{id:107,base:"Brandy",cat:"Punch",name:"Brandy Milk Punch",desc:"New Orleans brunch staple — creamy, warming, perfect",rating:4,diff:1,shake:15,
 i:[{n:"Cognac",a:2,t:"spirit"},{n:"Whole Milk",a:4,t:"cream"},{n:"Simple Syrup",a:0.5,t:"syrup"},{n:"Vanilla Extract",a:1,t:"other",unit:"tsp"}],
 steps:["Shake cognac, syrup, vanilla extract, and milk hard with ice.","Strain into a chilled rocks glass over ice.","Grate fresh nutmeg over the top."],
 garnish:"Fresh grated nutmeg",tip:"The brunch cocktail of New Orleans. Use whole milk for richness. A splash of bourbon alongside the cognac is a popular variation. Serve very cold."},

{id:108,base:"Brandy",cat:"Stirred",name:"Japanese Cocktail",desc:"Cognac, orgeat, Angostura — elegant and surprisingly delicious",rating:4,diff:1,shake:30,
 i:[{n:"Cognac",a:2,t:"spirit"},{n:"Orgeat Syrup",a:0.5,t:"syrup"},{n:"Angostura Bitters",a:2,t:"bitters",unit:"dashes"}],
 steps:["Stir all with ice 30 seconds in a mixing glass.","Strain into a chilled coupe.","Garnish with a lemon twist."],
 garnish:"Lemon twist",tip:"One of Jerry Thomas's originals from his 1862 Bar-Tender's Guide. Despite the name, it has no Japanese ingredients — it was named to honor Commodore Perry's famous Japan expedition. The orgeat adds almond richness."},

{id:109,base:"Brandy",cat:"Classic",name:"Between the Sheets",desc:"Cognac, rum, Cointreau, lemon — bright and punchy",rating:4,diff:1,shake:15,
 i:[{n:"Cognac",a:1,t:"spirit"},{n:"White Rum",a:1,t:"spirit"},{n:"Cointreau",a:1,t:"liqueur"},{n:"Fresh Lemon Juice",a:0.5,t:"juice"}],
 steps:["Shake all with ice 15 seconds.","Double strain into a chilled coupe.","Garnish with a lemon twist."],
 garnish:"Lemon twist",tip:"A 1930s classic that's essentially a Sidecar with rum added. The rum brings a tropical note that lifts the cognac beautifully. Equal parts is the key to balance."},

{id:110,base:"Brandy",cat:"Classic",name:"Metropolitan",desc:"Cognac Cosmopolitan — deeper and more complex",rating:4,diff:1,shake:15,
 i:[{n:"Cognac",a:1.5,t:"spirit"},{n:"Cointreau",a:0.5,t:"liqueur"},{n:"Cranberry Juice",a:0.5,t:"juice"},{n:"Fresh Lime Juice",a:0.25,t:"juice"}],
 steps:["Shake all with ice 15 seconds.","Double strain into a chilled martini glass.","Garnish with an expressed orange peel."],
 garnish:"Expressed orange peel",tip:"Think of it as a Cosmopolitan grown up. The cognac's dried fruit and oak notes turn a good drink into a great one."},

// ── MORE GIN ─────────────────────────────────────────────────
{id:15,base:"Gin",cat:"Sour",name:"Aviation",desc:"Gin, maraschino, crème de violette — the purple classic",rating:5,diff:2,shake:15,
 i:[{n:"Gin",a:2,t:"spirit"},{n:"Maraschino Liqueur",a:0.5,t:"liqueur"},{n:"Crème de Violette",a:0.25,t:"liqueur"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"}],
 steps:["Shake all with ice 15 seconds.","Double strain into a chilled coupe.","Garnish with a Luxardo cherry."],
 garnish:"Luxardo cherry",tip:"The crème de violette turns the drink a pale cloudy purple — the color of a sunset sky, hence the name. Use just a small amount or it turns medicinal. Crème Yvette is a good alternative."},

{id:16,base:"Gin",cat:"Classic",name:"Gimlet",desc:"Gin and lime cordial. Bracingly simple.",rating:4,diff:1,shake:15,
 i:[{n:"Gin",a:2.5,t:"spirit"},{n:"Fresh Lime Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.75,t:"syrup"}],
 steps:["Shake all with ice 15 seconds.","Strain into a chilled coupe.","Garnish with a lime wheel."],
 garnish:"Lime wheel",tip:"The traditional gimlet uses Rose's lime cordial — a 50/50 split with gin. The fresh lime version is a modern preference and genuinely better. Try it both ways."},

{id:17,base:"Gin",cat:"Highball",name:"Singapore Sling",desc:"Gin, cherry liqueur, Cointreau, pineapple — tropical legend",rating:4,diff:3,shake:15,
 i:[{n:"Gin",a:1.5,t:"spirit"},{n:"Cherry Liqueur",a:0.5,t:"liqueur"},{n:"Cointreau",a:0.25,t:"liqueur"},{n:"Bénédictine",a:0.25,t:"liqueur"},{n:"Pineapple Juice",a:2,t:"juice"},{n:"Fresh Lime Juice",a:0.5,t:"juice"},{n:"Grenadine",a:0.25,t:"syrup"},{n:"Angostura Bitters",a:1,t:"bitters",unit:"dash"}],
 steps:["Shake all with ice 15 seconds.","Strain over ice in a Collins glass.","Top with a small splash of club soda if desired.","Garnish with pineapple wedge and cherry."],
 garnish:"Pineapple wedge + cherry + umbrella",tip:"The original from Raffles Hotel, Singapore circa 1915. It looks complicated but it's built for batching beautifully. Make a pitcher — multiply everything by 8."},

// ── MORE TEQUILA ──────────────────────────────────────────────
{id:31,base:"Tequila",cat:"Classic",name:"Tequila Negroni",desc:"Agave-forward take on the bitter classic",rating:5,diff:1,shake:30,
 i:[{n:"Tequila Blanco",a:1,t:"spirit"},{n:"Campari",a:1,t:"liqueur"},{n:"Sweet Vermouth",a:1,t:"vermouth"}],
 steps:["Fill a mixing glass with ice.","Add tequila, Campari, and vermouth.","Stir 30 seconds.","Strain over a large rock.","Express orange peel over the top."],
 garnish:"Orange peel",tip:"Blanco tequila's grassy, vegetal notes work surprisingly well against Campari's bitterness. A different animal from the gin original — equally great."},

{id:32,base:"Tequila",cat:"Sour",name:"Añejo Sour",desc:"Aged tequila, lemon, honey — smooth and complex",rating:4,diff:2,shake:15,
 i:[{n:"Tequila Añejo",a:2,t:"spirit"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"},{n:"Honey Syrup",a:0.75,t:"syrup"},{n:"Egg White",a:1,t:"other",unit:"white"}],
 steps:["Dry shake all without ice 12 seconds.","Add ice. Shake hard 15 more seconds.","Double strain into a chilled coupe.","Garnish with a dehydrated lemon wheel."],
 garnish:"Dehydrated lemon wheel",tip:"Añejo tequila (aged 1+ years) brings oak, vanilla, and caramel that make it drink more like bourbon in a sour. Honey syrup (2:1 honey to water) amplifies the richness."},

// ── MORE VODKA ────────────────────────────────────────────────
{id:52,base:"Vodka",cat:"Classic",name:"Vodka Martini",desc:"Shaken or stirred — the argument never ends",rating:4,diff:1,shake:30,
 i:[{n:"Vodka",a:2.5,t:"spirit"},{n:"Dry Vermouth",a:0.5,t:"vermouth"}],
 steps:["Stir or shake with ice until very cold.","Strain into a chilled martini glass.","Garnish with a lemon twist or olive."],
 garnish:"Lemon twist or olive",tip:"James Bond orders his shaken — professional bartenders say stirred. Stirred is silkier; shaken is colder and diluted differently. Try both. The vermouth is not optional."},

{id:53,base:"Vodka",cat:"Classic",name:"White Russian",desc:"Vodka, Kahlúa, cream — The Dude abides",rating:4,diff:1,shake:0,
 i:[{n:"Vodka",a:2,t:"spirit"},{n:"Kahlúa",a:1,t:"liqueur"},{n:"Heavy Cream",a:1,t:"cream"}],
 steps:["Fill a rocks glass with ice.","Add vodka and Kahlúa.","Float the heavy cream over the back of a spoon — pour slowly.","The cream will gradually sink and mix as you drink."],
 garnish:"None",tip:"The cream float is the whole move — it creates a layered effect that slowly integrates. Don't stir it. Pour fresh cream, not half-and-half. Half the cream makes a Black Russian."},

// ── MORE WHISKEY ──────────────────────────────────────────────
{id:71,base:"Whiskey",cat:"Classic",name:"Penicillin",desc:"Blended Scotch, lemon, honey-ginger, Islay float",rating:5,diff:3,shake:15,
 i:[{n:"Blended Scotch",a:2,t:"spirit"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"},{n:"Honey-Ginger Syrup",a:0.75,t:"syrup"},{n:"Islay Scotch",a:0.25,t:"spirit",unit:"float"}],
 steps:["Shake blended Scotch, lemon juice, and honey-ginger syrup with ice 15 seconds.","Double strain over a large rock.","Float Islay Scotch over the back of a spoon.","Garnish with candied ginger on a cocktail pick."],
 garnish:"Candied ginger on pick",tip:"Honey-ginger syrup: simmer 2:1 honey to water with sliced fresh ginger 10 minutes, strain. The smoky Islay float (Laphroaig, Ardbeg) hits your nose before the drink hits your lips."},

{id:72,base:"Whiskey",cat:"Stirred",name:"Toronto",desc:"Rye, Fernet Branca, simple syrup — bittersweet and complex",rating:4,diff:1,shake:30,
 i:[{n:"Rye Whiskey",a:2,t:"spirit"},{n:"Fernet Branca",a:0.25,t:"liqueur"},{n:"Simple Syrup",a:0.25,t:"syrup"},{n:"Angostura Bitters",a:1,t:"bitters",unit:"dash"}],
 steps:["Stir all with ice 30 seconds.","Strain into a chilled coupe.","Garnish with an orange twist."],
 garnish:"Orange twist",tip:"Fernet Branca is intensely bitter and herbal — a little goes a long way. This is essentially a rye Old Fashioned with a menthol-bitter edge. Amaro Nonino makes a gentler version."},

// ── MORE RUM ──────────────────────────────────────────────────
{id:91,base:"Rum",cat:"Classic",name:"El Presidente",desc:"Aged rum, dry vermouth, Cointreau, grenadine — Cuban classic",rating:5,diff:1,shake:30,
 i:[{n:"Aged Rum",a:1.5,t:"spirit"},{n:"Dry Vermouth",a:0.75,t:"vermouth"},{n:"Cointreau",a:0.25,t:"liqueur"},{n:"Grenadine",a:0.25,t:"syrup"}],
 steps:["Stir all with ice in a mixing glass 30 seconds.","Strain into a chilled coupe.","Garnish with an orange twist."],
 garnish:"Orange twist",tip:"A pre-Prohibition Cuban classic. The dry vermouth makes it surprisingly light and elegant. Use a quality aged rum (Bacardi 8, Mount Gay XO) and real pomegranate grenadine."},

{id:92,base:"Rum",cat:"Tropical",name:"Painkiller",desc:"Dark rum, pineapple, OJ, coconut cream — paradise",rating:4,diff:1,shake:0,
 i:[{n:"Dark Rum",a:2,t:"spirit"},{n:"Pineapple Juice",a:4,t:"juice"},{n:"Orange Juice",a:1,t:"juice"},{n:"Coconut Cream",a:1,t:"cream"}],
 steps:["Combine all in a shaker and shake well.","Pour unstrained over crushed ice in a tiki mug.","Grate fresh nutmeg over the top generously.","Garnish with a pineapple slice and cherry."],
 garnish:"Fresh nutmeg + pineapple + cherry",tip:"The signature drink of the Soggy Dollar Bar in the British Virgin Islands. Pusser's Rum is the traditional choice. The fresh nutmeg on top is not optional — it defines the drink."},
{id:111,base:"Brandy",cat:"Highball",name:"Chilcano",desc:"Peru's everyday cocktail — pisco, ginger ale, lime, Angostura",rating:5,diff:1,shake:0,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Ginger Ale",a:5,t:"mixer"},{n:"Fresh Lime Juice",a:0.5,t:"juice"},{n:"Angostura Bitters",a:0.1,t:"bitters"},{n:"Ice",a:0,t:"other"}],
 steps:["Fill a highball glass with ice","Add pisco and lime juice","Top with cold ginger ale","Add a dash of Angostura bitters","Garnish with a lime wheel and serve immediately"],
 garnish:"Lime wheel",tip:"Use Inca Kola instead of ginger ale for a uniquely Peruvian twist. Angostura is non-negotiable — it's what separates a Chilcano from a pisco mule."},
{id:112,base:"Brandy",cat:"Classic",name:"Algarrobina",desc:"Peru's dessert cocktail — carob syrup, pisco, evaporated milk",rating:4,diff:1,shake:15,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Algarrobina Syrup",a:1,t:"syrup"},{n:"Evaporated Milk",a:1.5,t:"other"},{n:"Egg Yolk",a:1,t:"other"},{n:"Cinnamon",a:0,t:"other"}],
 steps:["Combine pisco, algarrobina, evaporated milk, and egg yolk in shaker","Add ice and shake vigorously for 15 seconds","Double strain into a chilled coupe","Dust with ground cinnamon"],
 garnish:"Ground cinnamon dusted on top",tip:"Algarrobina is a thick, sweet syrup made from carob pods — find it at Latin grocery stores. If unavailable, substitute dark molasses mixed with a touch of honey as an approximation."},
{id:113,base:"Brandy",cat:"Highball",name:"Peru Libre",desc:"The Peruvian Cuba Libre — pisco swaps rum, completely transforms it",rating:4,diff:1,shake:0,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Coca-Cola",a:4,t:"mixer"},{n:"Fresh Lime Juice",a:0.5,t:"juice"},{n:"Ice",a:0,t:"other"}],
 steps:["Fill a highball glass with ice","Squeeze and drop in the lime wedges","Pour pisco over the ice","Top with Coca-Cola and give one gentle stir","Garnish with a lime wedge"],
 garnish:"Lime wedge",tip:"Pisco has a distinctly different character than rum — more floral and grape-forward. Use a quebranta-style pisco (neutral, unoaked) for the most authentic version."},
{id:114,base:"Brandy",cat:"Sour",name:"Maracuyá Sour",desc:"Passion fruit pisco sour — tropical and electric",rating:5,diff:2,shake:15,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Passion Fruit Juice",a:1,t:"juice"},{n:"Fresh Lime Juice",a:0.5,t:"juice"},{n:"Simple Syrup",a:0.75,t:"syrup"},{n:"Egg White",a:1,t:"other"},{n:"Angostura Bitters",a:0.1,t:"bitters"}],
 steps:["Dry shake pisco, passion fruit juice, lime, syrup, and egg white without ice for 12 seconds","Add ice and shake hard for another 12 seconds","Double strain into a chilled coupe","Dot with Angostura bitters and drag a toothpick through for the classic pattern"],
 garnish:"Angostura bitters dots on foam",tip:"The dry shake before ice is what creates a thick, stable foam. Fresh or high-quality frozen passion fruit pulp is far superior to shelf-stable juice here."},
{id:115,base:"Brandy",cat:"Stirred",name:"Capitán",desc:"Peru's Manhattan — pisco meets sweet vermouth",rating:4,diff:1,shake:0,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Sweet Vermouth",a:1,t:"vermouth"},{n:"Angostura Bitters",a:2,t:"bitters"}],
 steps:["Combine pisco, sweet vermouth, and bitters in a mixing glass with ice","Stir for 30 full seconds until well chilled","Strain into a chilled coupe or Nick & Nora glass","Express a lemon peel over the drink and discard or drop it in"],
 garnish:"Expressed lemon peel",tip:"Less well-known than the Manhattan but just as elegant. Use an Italian quebranta pisco — its natural grape character pairs beautifully with vermouth. Don't rush the stir."},
{id:116,base:"Brandy",cat:"Sour",name:"Lucuma Sour",desc:"Andean superfruit sour — creamy, caramel-like, uniquely Peruvian",rating:4,diff:2,shake:15,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Lúcuma Syrup",a:1,t:"syrup"},{n:"Fresh Lime Juice",a:0.75,t:"juice"},{n:"Egg White",a:1,t:"other"},{n:"Simple Syrup",a:0.25,t:"syrup"}],
 steps:["Dry shake pisco, lúcuma syrup, lime juice, and egg white without ice for 12 seconds","Add ice and shake hard for another 12 seconds","Double strain into a chilled coupe","Garnish with a lime wheel and a light dusting of cinnamon"],
 garnish:"Lime wheel + cinnamon dust",tip:"Lúcuma is a Peruvian fruit with notes of sweet potato, maple, and caramel. Find lúcuma powder at Latin grocery stores and make a simple syrup with it. It's unlike anything else."},
{id:117,base:"Brandy",cat:"Classic",name:"Punto y Coma",desc:"Pisco, Campari, sweet vermouth — Peru's answer to the Negroni",rating:4,diff:1,shake:0,
 i:[{n:"Pisco",a:1.5,t:"spirit"},{n:"Campari",a:1,t:"liqueur"},{n:"Sweet Vermouth",a:1,t:"vermouth"},{n:"Orange Bitters",a:1,t:"bitters"}],
 steps:["Combine all ingredients in a mixing glass with ice","Stir for 30 full seconds","Strain into a rocks glass over a large ice cube","Express an orange peel over the surface and drop it in"],
 garnish:"Orange peel",tip:"A lesser-known Peruvian classic that deserves more attention. Pisco's floral grape notes make it softer and more aromatic than a standard Negroni. Outstanding before dinner."},
{id:118,base:"Brandy",cat:"Sour",name:"Pisco Punch",desc:"San Francisco's golden era cocktail — pisco, pineapple, citrus",rating:4,diff:1,shake:15,
 i:[{n:"Pisco",a:2,t:"spirit"},{n:"Pineapple Juice",a:1,t:"juice"},{n:"Fresh Lemon Juice",a:0.75,t:"juice"},{n:"Simple Syrup",a:0.5,t:"syrup"},{n:"Soda Water",a:1,t:"mixer"}],
 steps:["Shake pisco, pineapple juice, lemon juice, and simple syrup with ice","Strain into a rocks glass or punch cup over ice","Top with a splash of soda water","Garnish with a pineapple wedge and a cherry"],
 garnish:"Pineapple wedge + cherry",tip:"This was the must-drink cocktail of 1890s San Francisco, made famous by the Bank Exchange saloon. The original recipe used pineapple gum syrup — adding a splash of pineapple juice to your simple syrup approximates it well."},


,{id:119,base:"Gin",cat:"Classic",name:"French 75",desc:"A sparkling gin sour topped with Champagne — celebratory and bright.",diff:1,rating:4.7,i:[{n:"Gin",t:"spirit"},{n:"Lemon Juice",t:"juice"},{n:"Simple Syrup",t:"syrup"},{n:"Champagne",t:"mixer"}],steps:["Combine gin, lemon juice, and simple syrup in a shaker with ice.","Shake well and strain into a Champagne flute.","Top with Champagne and garnish."],garnish:"Lemon twist",tip:"Use fresh lemon juice only. The bubbles do the rest."}
,{id:120,base:"Gin",cat:"Classic",name:"Bee's Knees",desc:"A Prohibition-era sour sweetened with honey — clean and elegant.",diff:1,rating:4.6,i:[{n:"Gin",t:"spirit"},{n:"Lemon Juice",t:"juice"},{n:"Honey Syrup",t:"syrup"}],steps:["Combine all ingredients in a shaker with ice.","Shake vigorously for 15 seconds.","Double strain into a chilled coupe."],garnish:"Lemon twist",tip:"Make honey syrup by mixing equal parts honey and warm water. It transforms the drink."}
,{id:121,base:"Gin",cat:"Sour",name:"Clover Club",desc:"A pre-Prohibition classic — gin, lemon, raspberry, and a silky egg white foam.",diff:2,rating:4.5,i:[{n:"Gin",t:"spirit"},{n:"Lemon Juice",t:"juice"},{n:"Raspberry Syrup",t:"syrup"},{n:"Egg White",t:"other"}],steps:["Dry shake all ingredients without ice for 10 seconds.","Add ice and shake hard for another 15 seconds.","Double strain into a chilled coupe."],garnish:"3 fresh raspberries",tip:"The dry shake is essential for a proper foam. Don't skip it."}
,{id:122,base:"Gin",cat:"Classic",name:"Corpse Reviver No. 2",desc:"One of the great brunch cocktails — citrusy, herbal, and a touch absinthe.",diff:2,rating:4.6,i:[{n:"Gin",t:"spirit"},{n:"Cointreau",t:"liqueur"},{n:"Lillet Blanc",t:"vermouth"},{n:"Lemon Juice",t:"juice"},{n:"Absinthe",t:"spirit"}],steps:["Rinse a chilled coupe with absinthe and discard the excess.","Combine remaining ingredients in a shaker with ice.","Shake and double strain into the rinsed glass."],garnish:"Lemon twist",tip:"Four of these and you won't remember your name. Consider yourself warned."}
,{id:123,base:"Gin",cat:"Classic",name:"Southside",desc:"A gin mojito — mint, citrus, and botanical gin in perfect harmony.",diff:1,rating:4.4,i:[{n:"Gin",t:"spirit"},{n:"Lime Juice",t:"juice"},{n:"Simple Syrup",t:"syrup"},{n:"Fresh Mint",t:"other"}],steps:["Muddle mint gently with simple syrup in a shaker.","Add gin, lime juice, and ice.","Shake hard and double strain into a chilled coupe."],garnish:"Fresh mint sprig",tip:"Don't over-muddle the mint — a light press releases the oils without turning it bitter."}
,{id:124,base:"Gin",cat:"Stirred",name:"Hanky Panky",desc:"A richer, more complex Martini with the bittersweet depth of Fernet-Branca.",diff:2,rating:4.5,i:[{n:"Gin",t:"spirit"},{n:"Sweet Vermouth",t:"vermouth"},{n:"Fernet-Branca",t:"liqueur"}],steps:["Combine all ingredients in a mixing glass with ice.","Stir for 30 seconds until well chilled.","Strain into a chilled coupe."],garnish:"Orange twist",tip:"Fernet is polarizing but essential here. Use just a barspoon — it should whisper, not shout."}
,{id:125,base:"Rum",cat:"Classic",name:"Rum Old Fashioned",desc:"The whiskey classic reimagined with aged rum — molasses, vanilla, and oak.",diff:1,rating:4.6,i:[{n:"Aged Rum",t:"spirit"},{n:"Demerara Syrup",t:"syrup"},{n:"Angostura Bitters",t:"bitters"}],steps:["Combine rum, syrup, and bitters in a mixing glass with ice.","Stir for 30 seconds until diluted and cold.","Strain over a large ice cube in a rocks glass."],garnish:"Orange peel and cherry",tip:"Demerara syrup is the move here — the molasses notes echo the rum beautifully."}
,{id:126,base:"Rum",cat:"Tiki",name:"Three Dots and a Dash",desc:"WWII victory cocktail — tropical, layered, and festive.",diff:2,rating:4.5,i:[{n:"Aged Rum",t:"spirit"},{n:"Rhum Agricole",t:"spirit"},{n:"Lime Juice",t:"juice"},{n:"Orange Juice",t:"juice"},{n:"Honey Syrup",t:"syrup"},{n:"Allspice Dram",t:"liqueur"},{n:"Angostura Bitters",t:"bitters"}],steps:["Combine all ingredients in a shaker with ice.","Shake well and pour unstrained into a tiki mug or tall glass.","Fill with crushed ice."],garnish:"3 cherries and a pineapple frond",tip:"Named after the Morse code for V (victory). Serve with fanfare accordingly."}
,{id:127,base:"Rum",cat:"Tiki",name:"Zombie",desc:"The legendary Donn Beach tiki creation — powerful, fruity, and dangerously smooth.",diff:3,rating:4.7,i:[{n:"Light Rum",t:"spirit"},{n:"Dark Rum",t:"spirit"},{n:"Overproof Rum",t:"spirit"},{n:"Lime Juice",t:"juice"},{n:"Grapefruit Juice",t:"juice"},{n:"Cinnamon Syrup",t:"syrup"},{n:"Grenadine",t:"syrup"},{n:"Angostura Bitters",t:"bitters"}],steps:["Combine all ingredients in a blender or shaker with crushed ice.","Blend briefly or shake and pour into a tall glass.","Top with overproof rum float."],garnish:"Mint sprig and cherry",tip:"Limit two per customer. This is an actual rule at most tiki bars — respect it."}
,{id:128,base:"Rum",cat:"Tropical",name:"Bahama Mama",desc:"A fruity, tropical blend of rum and juices — vacation in a glass.",diff:1,rating:4.3,i:[{n:"Dark Rum",t:"spirit"},{n:"Coconut Rum",t:"spirit"},{n:"Pineapple Juice",t:"juice"},{n:"Orange Juice",t:"juice"},{n:"Grenadine",t:"syrup"}],steps:["Fill a tall glass with ice.","Add rums and juices and stir gently.","Float grenadine over the top."],garnish:"Pineapple wedge and cherry",tip:"Use good dark rum — it makes a real difference in depth and complexity."}
,{id:129,base:"Vodka",cat:"Classic",name:"Bloody Mary",desc:"The brunch cocktail — bold, savory, spicy, and deeply satisfying.",diff:2,rating:4.5,i:[{n:"Vodka",t:"spirit"},{n:"Tomato Juice",t:"juice"},{n:"Lemon Juice",t:"juice"},{n:"Worcestershire Sauce",t:"other"},{n:"Hot Sauce",t:"other"},{n:"Horseradish",t:"other"}],steps:["Combine all ingredients in a shaker with ice.","Roll between the shaker and a glass to mix without over-diluting.","Pour into a tall glass over fresh ice."],garnish:"Celery stalk, lemon wedge, olives",tip:"Build to your own taste — more heat, more citrus, more Worcestershire. Own it."}
,{id:130,base:"Vodka",cat:"Classic",name:"Lemon Drop",desc:"Sweet, tart, and crystal clear — a cocktail bar classic done right.",diff:1,rating:4.4,i:[{n:"Vodka",t:"spirit"},{n:"Cointreau",t:"liqueur"},{n:"Lemon Juice",t:"juice"},{n:"Simple Syrup",t:"syrup"}],steps:["Rim a chilled coupe with sugar.","Combine all ingredients in a shaker with ice.","Shake hard and double strain into the prepared glass."],garnish:"Lemon twist",tip:"Use fresh lemon juice. The difference between fresh and bottled is not subtle."}
,{id:131,base:"Vodka",cat:"Classic",name:"Pornstar Martini",desc:"The most ordered cocktail in the UK — vanilla vodka, passionfruit, and a side of Prosecco.",diff:1,rating:4.6,i:[{n:"Vanilla Vodka",t:"spirit"},{n:"Passoa",t:"liqueur"},{n:"Passionfruit Puree",t:"juice"},{n:"Lime Juice",t:"juice"},{n:"Vanilla Syrup",t:"syrup"}],steps:["Combine all ingredients in a shaker with ice.","Shake hard for 15 seconds.","Double strain into a chilled martini glass.","Serve with a shot of Prosecco on the side."],garnish:"Half a passionfruit",tip:"Always serve the Prosecco on the side — sip between each sip of the martini. That's the move."}
,{id:132,base:"Vodka",cat:"Highball",name:"Moscow Mule Royale",desc:"The copper mug classic elevated with a ginger beer upgrade and fresh mint.",diff:1,rating:4.4,i:[{n:"Vodka",t:"spirit"},{n:"Ginger Beer",t:"mixer"},{n:"Lime Juice",t:"juice"},{n:"Angostura Bitters",t:"bitters"}],steps:["Fill a copper mug with crushed ice.","Add vodka and lime juice and stir briefly.","Top with ginger beer and add bitters on top."],garnish:"Lime wheel and fresh mint",tip:"The copper mug keeps it colder longer. If you don't have one, a tall glass works fine."}
,{id:133,base:"Whiskey",cat:"Classic",name:"Mint Julep",desc:"The Kentucky Derby classic — bourbon, mint, sugar, and crushed ice.",diff:1,rating:4.5,i:[{n:"Bourbon",t:"spirit"},{n:"Simple Syrup",t:"syrup"},{n:"Fresh Mint",t:"other"}],steps:["Gently muddle mint with simple syrup in a julep cup.","Fill cup with crushed ice.","Pour bourbon over the ice and stir until the cup frosts."],garnish:"Large fresh mint bouquet",tip:"The mint bouquet is not decoration — you smell it with every sip. Pack it generously."}
,{id:134,base:"Whiskey",cat:"Classic",name:"Rusty Nail",desc:"Scotch and Drambuie — only two ingredients, completely unforgettable.",diff:1,rating:4.4,i:[{n:"Scotch",t:"spirit"},{n:"Drambuie",t:"liqueur"}],steps:["Fill a rocks glass with a large ice cube.","Add scotch and Drambuie.","Stir briefly to combine."],garnish:"Lemon twist",tip:"The ratio is everything — start 2:1 scotch to Drambuie and adjust. Some prefer it drier."}
,{id:135,base:"Whiskey",cat:"Classic",name:"Blood and Sand",desc:"A rare equal-parts Scotch classic with cherry, vermouth, and orange.",diff:2,rating:4.4,i:[{n:"Scotch",t:"spirit"},{n:"Cherry Heering",t:"liqueur"},{n:"Sweet Vermouth",t:"vermouth"},{n:"Orange Juice",t:"juice"}],steps:["Combine all ingredients in a shaker with ice.","Shake well and double strain into a chilled coupe."],garnish:"Orange twist",tip:"Use fresh orange juice. Named after the 1922 Rudolph Valentino film."}
,{id:136,base:"Whiskey",cat:"Classic",name:"Godfather",desc:"Two ingredients, infinite class — Scotch and amaretto in perfect proportion.",diff:1,rating:4.3,i:[{n:"Scotch",t:"spirit"},{n:"Amaretto",t:"liqueur"}],steps:["Fill a rocks glass with a large ice cube.","Add Scotch and amaretto.","Stir gently and serve."],garnish:"None — or a single cherry",tip:"Simple is the whole point. Use a Scotch you like — it'll show."}
,{id:137,base:"Whiskey",cat:"Highball",name:"Lynchburg Lemonade",desc:"Jack Daniel's meets lemonade — a Southern staple that's dangerously drinkable.",diff:1,rating:4.3,i:[{n:"Tennessee Whiskey",t:"spirit"},{n:"Cointreau",t:"liqueur"},{n:"Lemon Juice",t:"juice"},{n:"Simple Syrup",t:"syrup"},{n:"Lemon-Lime Soda",t:"mixer"}],steps:["Fill a tall glass with ice.","Add whiskey, Cointreau, lemon juice, and syrup.","Top with lemon-lime soda and stir gently."],garnish:"Lemon wheel and cherry",tip:"A crowd-pleaser at every gathering. Make a big batch for parties."}
,{id:138,base:"Tequila",cat:"Classic",name:"Matador",desc:"Tequila, pineapple, and lime — a tropical riff on the margarita template.",diff:1,rating:4.3,i:[{n:"Tequila",t:"spirit"},{n:"Pineapple Juice",t:"juice"},{n:"Lime Juice",t:"juice"}],steps:["Combine all ingredients in a shaker with ice.","Shake well and strain into a rocks glass over ice."],garnish:"Pineapple wedge",tip:"Blanco tequila works best here — its fresh agave notes shine with the pineapple."}
,{id:139,base:"Tequila",cat:"Highball",name:"Batanga",desc:"The Mexican bartender Don Javier's house drink — tequila, Coke, and salt.",diff:1,rating:4.2,i:[{n:"Blanco Tequila",t:"spirit"},{n:"Lime Juice",t:"juice"},{n:"Coca-Cola",t:"mixer"}],steps:["Salt the rim of a tall glass.","Fill with ice and add lime juice.","Pour in tequila and top with Coke. Stir with the lime."],garnish:"Lime wedge",tip:"Don Javier stirred this with a salt-crusted knife. The salt makes a difference."}

// ── STATE ────────────────────────────────────────────────────
let selId={discover:null,spirits:null};
let srv={}, subCat={}, timers={};
let showShop=false, showLog=false, logRat=4;
let curSpiritTab='all',spiritSearchQ='', curSpiritCat='All';
let discDiff=0, savedTab='recipes';
let recentlyViewed=[], partyPicks=[];
let myBar=[], logs={}, saved=[], customIngs=[], notes={}, shopList=[];
let searchQ="", dCat="All", curPage="discover";

try{myBar=JSON.parse(localStorage.getItem('sg_bar')||'[]');
  shopList=JSON.parse(localStorage.getItem('sg_shop')||'[]');}catch{}
try{customIngs=JSON.parse(localStorage.getItem('sg_custings')||'[]');}catch{}
try{recentlyViewed=JSON.parse(localStorage.getItem('sg_recent')||'[]');}catch{}
try{srv=JSON.parse(localStorage.getItem('sg_srv')||'{}');}catch{}
try{notes=JSON.parse(localStorage.getItem('sg_notes')||'{}');}catch{}
// Convert string keys back to numbers
try{const s2={};Object.keys(srv).forEach(k=>{s2[parseInt(k)]=srv[k];});srv=s2;}catch{}
try{logs=JSON.parse(localStorage.getItem('sg_logs')||'{}');}catch{}
try{saved=JSON.parse(localStorage.getItem('sg_saved')||'[]');}catch{}

function saveShopList(){localStorage.setItem('sg_shop',JSON.stringify(shopList));}
function addToShopList(recipeId){
  const r=R.find(x=>x.id===recipeId);if(!r)return;
  const missing=r.i.filter(g=>!myBar.includes(g.n)&&!shopList.includes(g.n));
  if(missing.length===0){if(typeof showToast==='function')showToast('You have everything!');return;}
  missing.forEach(n=>{if(!shopList.includes(n))shopList.push(n);});
  saveShopList();
  if(typeof showToast==='function')showToast(missing.length+' ingredient'+(missing.length>1?'s':'')+' added to list');
  renderSaved();
}
function removeFromShopList(n){
  shopList=shopList.filter(x=>x!==n);
  saveShopList();
  renderSaved();
}
function clearShopList(){
  shopList=[];saveShopList();renderSaved();
}

function persist(){try{localStorage.setItem('sg_bar',JSON.stringify(myBar));localStorage.setItem('sg_logs',JSON.stringify(logs));localStorage.setItem('sg_saved',JSON.stringify(saved));localStorage.setItem('sg_custings',JSON.stringify(customIngs));localStorage.setItem('sg_recent',JSON.stringify(recentlyViewed));localStorage.setItem('sg_srv',JSON.stringify(srv));localStorage.setItem('sg_notes',JSON.stringify(notes));}catch(e){}}

const ALLS=[...new Set(R.filter(r=>r&&r.i).flatMap(r=>r.i.map(i=>i.n)))].sort();
const ITM={};R.filter(r=>r&&r.i).forEach(r=>r.i.forEach(i=>{if(!ITM[i.n])ITM[i.n]=i.t;}));
const DCATS=["All",...[...new Set(R.map(r=>r.cat))].filter(Boolean).sort()];

// ── NAVIGATION ───────────────────────────────────────────────
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  const pg=document.getElementById('page-'+id);
  if(pg)pg.classList.add('on');
  const activeBtn=document.querySelector('.bnav-btn[data-page="'+id+'"]');
  if(activeBtn)activeBtn.classList.add('on');
  curPage=id;
  if(id==='discover')renderDiscover();
  else if(id==='spirits')renderSpiritsPage();
  else if(SPAGES[id])renderSpirit(id);
  else if(id==='bar')renderBar();
    else if(id==='saved')renderSaved();
  else if(id==='generator')renderGenerator();
  else if(id==='spirits')renderSpiritsPage();
}

function renderCurPage(){if(curPage==='discover')renderDiscover();else if(SPAGES[curPage])renderSpirit(curPage);}

function surprise(){
  const r=R[Math.floor(Math.random()*R.length)];
  selId['spirits']=r.id;
  srv[r.id]=srv[r.id]||1;
  if(!timers[r.id])timers[r.id]={left:0,run:false,done:false,int:null};
  showShop=false;showLog=false;
  curSpiritTab=r.base;
  curSpiritCat='All';
  showPage('spirits');
  setTimeout(function(){
    renderDetail('spirits');
    document.getElementById('spiritsDetail')?.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}

// ── DISCOVER ─────────────────────────────────────────────────

function filterSearch(){
  searchQ=document.getElementById('searchInput')?.value||'';
  if(searchQ){
    // Reset category and difficulty filters so ingredient search works across all recipes
    dCat='All';discDiff=0;
    document.querySelectorAll('#catChips .chip').forEach(c=>c.classList.remove('on'));
    const allChip=document.querySelector('#catChips .chip');if(allChip)allChip.classList.add('on');
    document.querySelectorAll('#diffChips .chip').forEach((c,i)=>{c.classList.toggle('on',i===0);});
  }
  renderDiscGrid();
}
function filterSpiritSearch(){spiritSearchQ=norm(document.getElementById('spiritSearchInput')?.value||'');renderSpiritsGrid();}

function renderDiscover(){
  renderCOTD();
  renderRecentlyViewed();
  document.getElementById('catChips').innerHTML=DCATS.map(c=>
    `<button class="chip ${dCat===c?'on':''}" onclick="dCat='${c}';renderDiscover()">${c}</button>`
  ).join('');
  renderDiscGrid();
}

function setDiscDiff(d){
  discDiff=d;
  document.querySelectorAll('#diffChips .chip').forEach(function(b,i){b.classList.toggle('on',i===d);});
  renderDiscGrid();
}


function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}

function renderDiscGrid(){
  const f=R.filter(r=>r&&r.i&&(dCat==='All'||r.cat===dCat)&&(discDiff===0||r.diff===discDiff)&&(()=>{const q=norm(searchQ);return !q||norm(r.name).includes(q)||norm(r.base).includes(q)||r.i.some(x=>norm(x.n).includes(q));})());
  document.getElementById('discoverGrid').innerHTML=cards(f,'discover')||'<div style="grid-column:1/-1;text-align:center;padding:28px;color:var(--muted);font-style:italic">No cocktails found</div>';
}

// ── SPIRIT PAGES ─────────────────────────────────────────────
function renderSpirit(pid){
  const base=SPAGES[pid];
  const recipes=R.filter(r=>r.base===base);
  const cats=["All",...[...new Set(recipes.map(r=>r.cat))]];
  const sc=subCat[pid]||"All";
  document.getElementById(pid+'Count').textContent=recipes.length+' recipes';
  document.getElementById(pid+'Sub').innerHTML=cats.map(c=>
    `<button class="chip ${sc===c?'on':''}" onclick="subCat['${pid}']='${c}';renderSpirit('${pid}')">${c}</button>`
  ).join('');
  const f=sc==="All"?recipes:recipes.filter(r=>r.cat===sc);
  document.getElementById(pid+'Grid').innerHTML=cards(f,pid)||'<div style="grid-column:1/-1;text-align:center;padding:28px;color:var(--muted);font-style:italic">No cocktails found</div>';
  renderDetail(pid);
}

// ── CARDS & DETAIL ───────────────────────────────────────────
function clr(r){if(!r)return'#c9a96e';return SC[r.cat]||SC[r.base]||'#c9a96e';}
function txtClr(c){return c==='#c9a96e'||c==='#fcd34d'?'#000':'#fff';}

function cards(recipes,pid){
  if(!recipes||!recipes.length)return'';
  return recipes.filter(r=>r&&r.id).map(r=>{
    const c=clr(r),on=selId[pid]===r.id;
    return`<button class="rcard" data-id="${r.id}" style="${on?`border-color:${c};background:${c}18`:''}" onclick="sel(${r.id},'${pid}')">
      <div class="rcard-dot" style="background:${c}"></div>
      <div class="rcard-name" style="font-size:15px">${r.name}</div>
      <div class="rcard-cat">${r.cat}</div>
      <div class="rcard-foot">${strs(r.rating)}<span class="badge" style="background:${DC[r.diff]}20;color:${DC[r.diff]}">${DL[r.diff]}</span></div>
    </button>`;
  }).join('');
}

function sel(id,pid){
  selId[pid]=id;if(!srv[id])srv[id]=1;
  recentlyViewed=recentlyViewed.filter(x=>x!==id);
  recentlyViewed.unshift(id);
  if(recentlyViewed.length>7)recentlyViewed=recentlyViewed.slice(0,7);
  persist();
  showShop=false;showLog=false;
  if(timers[id]){clearInterval(timers[id].int);}
  timers[id]={left:0,run:false,done:false,int:null};
  if(pid==='discover')renderDiscGrid();
  else if(pid==='spirits')renderSpiritsGrid();
  else renderSpirit(pid);
  renderDetail(pid);
  setTimeout(()=>document.getElementById(pid+'Detail')?.scrollIntoView({behavior:'smooth',block:'start'}),50);
}

function renderDetail(pid){
  try{_renderDetail(pid);}catch(e){console.error('renderDetail error:',e.message);}
}
function _renderDetail(pid){
  const el=document.getElementById(pid+'Detail');if(!el)return;
  const id=selId[pid];if(!id){el.innerHTML='';return;}
  const r=R.find(x=>x&&x.id===id);if(!r){el.innerHTML='';return;}
  const c=clr(r),tc=txtClr(c),s=srv[id]||1;
  const tot=r.i.reduce((a,x)=>a+(x.a||0)*s,0);
  const rl=logs[id]||[];const dur=r.shake||20;
  const tm=timers[id]||{left:0,run:false,done:false};
  const isSaved=saved.find(x=>x&&x.id===r.id);
  const circ=2*Math.PI*25,pct=tm.done?1:tm.run?(dur-tm.left)/dur:0;

  el.innerHTML=`<div class="detail" style="border-color:${c}25">
    <div class="detail-top">
      <div style="flex:1">
        <div class="detail-cat" style="color:${c}">${r.base} · ${r.cat}</div>
        <div class="detail-name" style="font-size:24px">${r.name}</div>
        <div class="detail-desc">${r.desc}</div>
        <div class="detail-badges">${strs(r.rating)}<span class="badge" style="background:${DC[r.diff]}20;color:${DC[r.diff]}">${DL[r.diff]}</span>
          ${(()=>{const abv=calcABV(r,s);return abv?`<span class="badge" style="background:rgba(196,122,42,0.15);color:var(--accent-light)">~${abv}% ABV</span>`:''})()}
          <button onclick="toggleSave(${r.id})" style="font-size:10px;padding:2px 8px;border-radius:12px;cursor:pointer;border:1px solid ${isSaved?c+'80':'rgba(255,255,255,0.15)'};background:${isSaved?c+'25':'transparent'};color:${isSaved?c:'var(--muted)'};letter-spacing:1px;text-transform:uppercase">${isSaved?'✓ Saved':'+ Save'}</button>
          <button onclick="addToShopList(${r.id})" style="font-size:10px;padding:2px 8px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--muted);letter-spacing:1px;text-transform:uppercase">🛒 Shop</button>
          <button onclick="shareRecipe(${r.id})" style="font-size:10px;padding:2px 8px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--muted);letter-spacing:1px;text-transform:uppercase">↗ Share</button>
        </div>
      </div>
      ${r.shake>0?`<div class="timer-wrap" onclick="startT(${id},${dur},'${pid}')">
        <div class="timer-ring"><svg width="56" height="56" style="transform:rotate(-90deg)">
          <circle cx="28" cy="28" r="25" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
          <circle id="arc${id}" cx="28" cy="28" r="25" fill="none" stroke="${c}" stroke-width="4"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}" style="transition:stroke-dashoffset 1s linear" stroke-linecap="round"/>
        </svg><div class="timer-inner" id="tnum${id}" style="color:${tm.done?c:'var(--text)'};font-size:${tm.run?'18px':'13px'}">${tm.done?"✓":tm.run?tm.left:"Go"}</div></div>
        <div class="timer-lbl" id="tlbl${id}">${tm.done?"Ready":tm.run?"Shaking":"Tap"}</div>
      </div>`:''}
    </div>

    <div class="batch-s" style="border:1px solid ${c}20">
      <div style="font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase">Batch · ~${tot.toFixed(1)} oz total</div>
      <div class="srv-row">${[1,2,4,6,8,12].map(n=>`<button class="srv-btn" style="${s===n?`background:${c};border-color:${c};color:${tc}`:''}" onclick="setSrv(${id},'${pid}',${n})">${n}</button>`).join('')}<span style="font-size:10px;color:var(--muted)">drinks</span></div>
    </div>

    <div class="ing-list">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
        <div class="sh" style="margin:0">Ingredients</div>
        <button onclick="showShop=!showShop;renderDetail('${pid}')" style="font-size:9px;color:var(--gold);background:transparent;border:1px solid rgba(201,169,110,0.3);border-radius:6px;padding:3px 8px;cursor:pointer;letter-spacing:1px">🛒 Shop</button>
      </div>
      ${r.i.map(g=>`<div class="ing-row" style="border-left:3px solid ${TC[g.t]||'#888'}">
        <div class="ing-l"><span style="font-size:13px">${g.n}</span><span class="badge" style="background:${TC[g.t]||'#888'}20;color:${TC[g.t]||'#888'}">${TL[g.t]||g.t}</span>${myBar.includes(g.n)?'<span style="color:#10b981;font-size:11px">✓</span>':'<span style="color:#ef444460;font-size:11px">✗</span>'}</div>
        <div><div class="ing-amt" style="color:${c}">${g.unit?`${Math.round(g.a*s)} ${g.unit}`:oz(g.a*s)}</div>${s>1?`<div class="ing-per">${g.unit?`${g.a} ${g.unit}`:oz(g.a)} ×${s}</div>`:''}</div>
      </div>`).join('')}
    </div>
